name: Actualizar datos BigQuery

on:
  schedule:
    - cron: '0 11 * * *'  # 6:00 AM Colombia (UTC-5)
  workflow_dispatch:  # Permite ejecutar manualmente desde GitHub

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: google-github-actions/setup-gcloud@v2

      - name: Authenticate with user credentials
        run: |
          echo '${{ secrets.GCP_CREDENTIALS }}' > /tmp/adc.json
          gcloud config set project ${{ secrets.GCP_PROJECT }}
          export CLOUDSDK_AUTH_CREDENTIAL_FILE_OVERRIDE=/tmp/adc.json
          echo "CLOUDSDK_AUTH_CREDENTIAL_FILE_OVERRIDE=/tmp/adc.json" >> $GITHUB_ENV
          export GOOGLE_APPLICATION_CREDENTIALS=/tmp/adc.json
          echo "GOOGLE_APPLICATION_CREDENTIALS=/tmp/adc.json" >> $GITHUB_ENV

      - name: Query BigQuery
        run: |
          bq query --use_legacy_sql=false --format=json --max_rows=10000 "
          WITH base AS (
            SELECT
              tni.id AS negocio_id, tiv.fuente_id, DATE(tni.fecha_creacion) AS fecha,
              tni.fecha_creacion AS fecha_ts, tni.last_estado_id,
              CASE WHEN tni.last_estado_id IN (7,39) THEN 1 ELSE 0 END AS ei,
              IF(tiv.area IS NULL OR tiv.area = 0,1,0) AS fa, IF(tiv.banos IS NULL OR tiv.banos = 0,1,0) AS fb,
              IF(tiv.num_habitaciones IS NULL OR tiv.num_habitaciones = 0,1,0) AS fh, IF(tiv.anos_antiguedad IS NULL,1,0) AS fn,
              IF(tiv.tipo_inmueble_id IS NULL,1,0) AS ft, IF(tl.lote_id IS NULL,1,0) AS fl,
              IF(tl.direccion IS NULL OR tl.direccion = '',1,0) AS fd, IF(tiv.garajes IS NULL,1,0) AS fg,
              IF(tiv.num_ascensores IS NULL,1,0) AS fc,
              tiv.tipo_inmueble_id AS tid
            FROM \`papyrus-data.habi_db.tabla_negocio_inmueble\` tni
            LEFT JOIN \`papyrus-data.habi_db.tabla_inmueble_v2\` tiv ON tiv.id = tni.inmueble_id
            LEFT JOIN \`papyrus-data.habi_db.tabla_localizacion_inmueble_v2\` tl ON tiv.localizacion_new_id = tl.id
            WHERE DATE(tni.fecha_creacion) >= '2024-01-01' AND tiv.fuente_id IN (3,7,20,35,39,47)
          ),
          inc_hist AS (
            SELECT DISTINCT h.negocio_id
            FROM \`sellers-main-prod.co_rds_staging.habi_db_tabla_historico_estado_v2\` h
            INNER JOIN base b ON b.negocio_id = h.negocio_id
            WHERE h.estado_id IN (7,39) AND DATETIME_DIFF(h.fecha_actualizacion, b.fecha_ts, MINUTE) >= 60
          ),
          inc_actual_60 AS (
            SELECT negocio_id FROM base
            WHERE last_estado_id IN (7,39) AND DATETIME_DIFF(CURRENT_DATETIME(), fecha_ts, MINUTE) >= 60
          ),
          inc_real AS (
            SELECT negocio_id FROM inc_hist UNION DISTINCT SELECT negocio_id FROM inc_actual_60
          ),
          recovered_ids AS (
            SELECT ir.negocio_id FROM inc_real ir
            INNER JOIN base b ON b.negocio_id = ir.negocio_id
            WHERE b.last_estado_id NOT IN (7,39)
          ),
          last_exit AS (
            SELECT h.negocio_id, h.agente,
              ROW_NUMBER() OVER (PARTITION BY h.negocio_id ORDER BY h.fecha_actualizacion DESC) rn
            FROM \`sellers-main-prod.co_rds_staging.habi_db_tabla_historico_estado_v2\` h
            INNER JOIN recovered_ids r ON r.negocio_id = h.negocio_id
            WHERE h.estado_id NOT IN (7,39)
          ),
          agent_map AS (
            SELECT negocio_id,
              CASE
                WHEN agente LIKE 'nexus:%' THEN 'Nexus'
                WHEN agente = 'MabiCO' THEN 'MabiCO'
                WHEN agente = 'wha_bot' THEN 'WhatsApp Bot'
                WHEN agente = 'duplicate-backbone' THEN 'Dup-backbone'
                WHEN agente = 'pricing_massive@habi.co' THEN 'Pricing masivo'
                WHEN agente = 'docking-backbone' THEN 'Docking-backbone'
                WHEN agente LIKE '%@habi.co' THEN 'Agentes Habi (otros)'
                ELSE 'Otros'
              END AS agente_grupo
            FROM last_exit WHERE rn = 1
          ),
          enriched AS (
            SELECT b.*,
              IF(ir.negocio_id IS NOT NULL, 1, 0) AS is_ir,
              IF(rec.negocio_id IS NOT NULL, 1, 0) AS is_rec,
              am.agente_grupo
            FROM base b
            LEFT JOIN inc_real ir ON ir.negocio_id = b.negocio_id
            LEFT JOIN recovered_ids rec ON rec.negocio_id = b.negocio_id
            LEFT JOIN agent_map am ON am.negocio_id = b.negocio_id
          ),
          monthly AS (
            SELECT 'M' AS g, fuente_id AS f, FORMAT_DATE('%Y-%m',fecha) AS p,
              COUNT(*) t, COUNTIF(ei=1) i, COUNTIF(is_ir=1) ir, COUNTIF(is_rec=1) rec,
              COUNTIF(ei=1 AND fa=1) a, COUNTIF(ei=1 AND fb=1) b, COUNTIF(ei=1 AND fh=1) h,
              COUNTIF(ei=1 AND fn=1) n, COUNTIF(ei=1 AND ft=1) ti, COUNTIF(ei=1 AND fl=1) l,
              COUNTIF(ei=1 AND fd=1) d, COUNTIF(ei=1 AND fg=1) ga, COUNTIF(ei=1 AND fc=1) ac,
              COUNTIF(is_rec=1 AND agente_grupo='Nexus') ag_nexus,
              COUNTIF(is_rec=1 AND agente_grupo='MabiCO') ag_mabi,
              COUNTIF(is_rec=1 AND agente_grupo='WhatsApp Bot') ag_wha,
              COUNTIF(is_rec=1 AND agente_grupo='Dup-backbone') ag_dup,
              COUNTIF(is_rec=1 AND agente_grupo='Pricing masivo') ag_pricing,
              COUNTIF(is_rec=1 AND agente_grupo='Docking-backbone') ag_dock,
              COUNTIF(is_rec=1 AND agente_grupo='Agentes Habi (otros)') ag_habi,
              COUNTIF(is_rec=1 AND agente_grupo='Otros') ag_otros,
              COUNTIF(tid=1) tp1, COUNTIF(tid=2) tp2, COUNTIF(tid=3) tp3, COUNTIF(tid=4) tp4, COUNTIF(tid=5) tp5, COUNTIF(tid NOT IN (1,2,3,4,5) AND tid IS NOT NULL) tpo, COUNTIF(tid IS NULL) tpn,
              COUNTIF(ei=1 AND tid=1) ip1, COUNTIF(ei=1 AND tid=2) ip2, COUNTIF(ei=1 AND tid=3) ip3, COUNTIF(ei=1 AND tid=4) ip4, COUNTIF(ei=1 AND tid=5) ip5, COUNTIF(ei=1 AND tid NOT IN (1,2,3,4,5) AND tid IS NOT NULL) ipo, COUNTIF(ei=1 AND tid IS NULL) ipn
            FROM enriched GROUP BY f,p
          ),
          week_periods AS (
            SELECT DISTINCT DATE_TRUNC(fecha, ISOWEEK) ws FROM enriched
            WHERE DATE_TRUNC(fecha, ISOWEEK) < DATE_TRUNC(CURRENT_DATE(), ISOWEEK)
            ORDER BY ws DESC LIMIT 25
          ),
          weekly AS (
            SELECT 'W' AS g, fuente_id AS f, FORMAT_DATE('%Y-W%V', DATE_TRUNC(fecha, ISOWEEK)) AS p,
              COUNT(*) t, COUNTIF(ei=1) i, COUNTIF(is_ir=1) ir, COUNTIF(is_rec=1) rec,
              COUNTIF(ei=1 AND fa=1) a, COUNTIF(ei=1 AND fb=1) b, COUNTIF(ei=1 AND fh=1) h,
              COUNTIF(ei=1 AND fn=1) n, COUNTIF(ei=1 AND ft=1) ti, COUNTIF(ei=1 AND fl=1) l,
              COUNTIF(ei=1 AND fd=1) d, COUNTIF(ei=1 AND fg=1) ga, COUNTIF(ei=1 AND fc=1) ac,
              COUNTIF(is_rec=1 AND agente_grupo='Nexus') ag_nexus,
              COUNTIF(is_rec=1 AND agente_grupo='MabiCO') ag_mabi,
              COUNTIF(is_rec=1 AND agente_grupo='WhatsApp Bot') ag_wha,
              COUNTIF(is_rec=1 AND agente_grupo='Dup-backbone') ag_dup,
              COUNTIF(is_rec=1 AND agente_grupo='Pricing masivo') ag_pricing,
              COUNTIF(is_rec=1 AND agente_grupo='Docking-backbone') ag_dock,
              COUNTIF(is_rec=1 AND agente_grupo='Agentes Habi (otros)') ag_habi,
              COUNTIF(is_rec=1 AND agente_grupo='Otros') ag_otros,
              COUNTIF(tid=1) tp1, COUNTIF(tid=2) tp2, COUNTIF(tid=3) tp3, COUNTIF(tid=4) tp4, COUNTIF(tid=5) tp5, COUNTIF(tid NOT IN (1,2,3,4,5) AND tid IS NOT NULL) tpo, COUNTIF(tid IS NULL) tpn,
              COUNTIF(ei=1 AND tid=1) ip1, COUNTIF(ei=1 AND tid=2) ip2, COUNTIF(ei=1 AND tid=3) ip3, COUNTIF(ei=1 AND tid=4) ip4, COUNTIF(ei=1 AND tid=5) ip5, COUNTIF(ei=1 AND tid NOT IN (1,2,3,4,5) AND tid IS NOT NULL) ipo, COUNTIF(ei=1 AND tid IS NULL) ipn
            FROM enriched WHERE DATE_TRUNC(fecha, ISOWEEK) IN (SELECT ws FROM week_periods) GROUP BY f,p
          ),
          day_periods AS (
            SELECT DISTINCT fecha FROM enriched WHERE fecha < CURRENT_DATE() ORDER BY fecha DESC LIMIT 25
          ),
          daily AS (
            SELECT 'D' AS g, fuente_id AS f, CAST(fecha AS STRING) AS p,
              COUNT(*) t, COUNTIF(ei=1) i, COUNTIF(is_ir=1) ir, COUNTIF(is_rec=1) rec,
              COUNTIF(ei=1 AND fa=1) a, COUNTIF(ei=1 AND fb=1) b, COUNTIF(ei=1 AND fh=1) h,
              COUNTIF(ei=1 AND fn=1) n, COUNTIF(ei=1 AND ft=1) ti, COUNTIF(ei=1 AND fl=1) l,
              COUNTIF(ei=1 AND fd=1) d, COUNTIF(ei=1 AND fg=1) ga, COUNTIF(ei=1 AND fc=1) ac,
              COUNTIF(is_rec=1 AND agente_grupo='Nexus') ag_nexus,
              COUNTIF(is_rec=1 AND agente_grupo='MabiCO') ag_mabi,
              COUNTIF(is_rec=1 AND agente_grupo='WhatsApp Bot') ag_wha,
              COUNTIF(is_rec=1 AND agente_grupo='Dup-backbone') ag_dup,
              COUNTIF(is_rec=1 AND agente_grupo='Pricing masivo') ag_pricing,
              COUNTIF(is_rec=1 AND agente_grupo='Docking-backbone') ag_dock,
              COUNTIF(is_rec=1 AND agente_grupo='Agentes Habi (otros)') ag_habi,
              COUNTIF(is_rec=1 AND agente_grupo='Otros') ag_otros,
              COUNTIF(tid=1) tp1, COUNTIF(tid=2) tp2, COUNTIF(tid=3) tp3, COUNTIF(tid=4) tp4, COUNTIF(tid=5) tp5, COUNTIF(tid NOT IN (1,2,3,4,5) AND tid IS NOT NULL) tpo, COUNTIF(tid IS NULL) tpn,
              COUNTIF(ei=1 AND tid=1) ip1, COUNTIF(ei=1 AND tid=2) ip2, COUNTIF(ei=1 AND tid=3) ip3, COUNTIF(ei=1 AND tid=4) ip4, COUNTIF(ei=1 AND tid=5) ip5, COUNTIF(ei=1 AND tid NOT IN (1,2,3,4,5) AND tid IS NOT NULL) ipo, COUNTIF(ei=1 AND tid IS NULL) ipn
            FROM enriched WHERE fecha IN (SELECT fecha FROM day_periods) GROUP BY f,p
          )
          SELECT * FROM monthly UNION ALL SELECT * FROM weekly UNION ALL SELECT * FROM daily
          ORDER BY g,f,p
          " > /tmp/bq_raw.json

      - name: Process and update data.json
        run: |
          python3 -c "
          import json
          with open('/tmp/bq_raw.json') as f:
              data = json.load(f)
          for r in data:
              for k in ['f','t','i','ir','rec','a','b','h','n','ti','l','d','ga','ac','ag_nexus','ag_mabi','ag_wha','ag_dup','ag_pricing','ag_dock','ag_habi','ag_otros','tp1','tp2','tp3','tp4','tp5','tpo','tpn','ip1','ip2','ip3','ip4','ip5','ipo','ipn']:
                  r[k] = int(r[k])
          with open('incompletos-colombia/data.json','w') as f:
              json.dump(data, f, separators=(',',':'))
          print(f'Rows: {len(data)}')
          "

      - name: Query Funnel Sellers (CO + MX)
        if: always()
        run: |
          bq query --use_legacy_sql=false --format=json --max_rows=100000 < <(cat <<'SQL'
          WITH funnel_reach AS (
            SELECT 'Colombia' AS c, nid,
              MAX(IF(valor = 'Primer_asigancion', 1, 0)) AS asg,
              MAX(IF(valor = 'Cita agendada', 1, 0)) AS cit,
              MAX(IF(valor = 'Visita efectuada', 1, 0)) AS vis,
              MAX(IF(valor IN ('Aprobado', 'inmueble aprobado'), 1, 0)) AS apr,
              MAX(IF(valor IN ('Aceptó Oferta - Pendiente firma', 'Aceptó Oferta - aplazado'), 1, 0)) AS acp,
              MAX(IF(valor = 'Cierre - Comprado', 1, 0)) AS cie
            FROM `papyrus-data.habi_wh_bi.funnel_diarios_col` WHERE nid IS NOT NULL GROUP BY c, nid
            UNION ALL
            SELECT 'México' AS c, nid,
              MAX(IF(valor = 'Primer asignacion', 1, 0)) AS asg,
              MAX(IF(valor IN ('Cita Agendada', 'Cita Agendada (hubspot)'), 1, 0)) AS cit,
              MAX(IF(valor IN ('Visita Efectuada', 'Visita Efectuada (hubspot)'), 1, 0)) AS vis,
              MAX(IF(valor IN ('Aprobado General', 'Primer inmueble aprobado'), 1, 0)) AS apr,
              MAX(IF(valor = 'Acepto Oferta - Pendiente firma', 1, 0)) AS acp,
              MAX(IF(valor = 'Cierre - Comprado', 1, 0)) AS cie
            FROM `sellers-main-prod.bi_mx.seguimiento_funnel_mex` WHERE nid IS NOT NULL GROUP BY c, nid
          ),
          base AS (
            SELECT 'Colombia' AS c, tig.nid, tig.fuente_id, tig.fuente, DATE(tig.fecha_creacion) AS fecha,
              IF(tig.last_estado_id IN (20,63), 1, 0) AS calificado,
              COALESCE(fr.asg,0) asg, COALESCE(fr.cit,0) cit, COALESCE(fr.vis,0) vis,
              COALESCE(fr.apr,0) apr, COALESCE(fr.acp,0) acp, COALESCE(fr.cie,0) cie
            FROM `papyrus-data.habi_wh_bi.tabla_inmuebles_general` tig
            LEFT JOIN funnel_reach fr ON fr.c = 'Colombia' AND fr.nid = tig.nid
            WHERE tig.nid IS NOT NULL AND tig.fecha_creacion IS NOT NULL AND tig.fuente_id IN (3,7,20,35,39,47)
            UNION ALL
            SELECT 'México' AS c, tig.nid, tig.fuente_id, tig.fuente, DATE(tig.fecha_creacion) AS fecha,
              IF(tig.id_ultimo_estado IN (20,63), 1, 0) AS calificado,
              COALESCE(fr.asg,0) asg, COALESCE(fr.cit,0) cit, COALESCE(fr.vis,0) vis,
              COALESCE(fr.apr,0) apr, COALESCE(fr.acp,0) acp, COALESCE(fr.cie,0) cie
            FROM `papyrus-data-mx.habi_wh_bi.tabla_inmuebles_general` tig
            LEFT JOIN funnel_reach fr ON fr.c = 'México' AND fr.nid = tig.nid
            WHERE tig.nid IS NOT NULL AND tig.fecha_creacion IS NOT NULL AND tig.fuente_id IN (3,7,35,39,46,47)
          ),
          day_periods AS (SELECT DISTINCT fecha FROM base WHERE fecha <= CURRENT_DATE() ORDER BY fecha DESC LIMIT 25),
          week_periods AS (SELECT DISTINCT DATE_TRUNC(fecha, ISOWEEK) p FROM base ORDER BY p DESC LIMIT 25),
          comm_periods AS (SELECT DISTINCT DATE_TRUNC(fecha, WEEK(WEDNESDAY)) p FROM base ORDER BY p DESC LIMIT 25),
          quarter_periods AS (SELECT DISTINCT DATE_TRUNC(fecha, QUARTER) p FROM base ORDER BY p DESC LIMIT 25),
          daily AS (SELECT 'D' g, c, fuente_id f, ANY_VALUE(fuente) fn, CAST(fecha AS STRING) p, COUNT(DISTINCT nid) t, COUNT(DISTINCT IF(calificado=1,nid,NULL)) cal, COUNT(DISTINCT IF(asg=1,nid,NULL)) asg, COUNT(DISTINCT IF(cit=1,nid,NULL)) cit, COUNT(DISTINCT IF(vis=1,nid,NULL)) vis, COUNT(DISTINCT IF(apr=1,nid,NULL)) apr, COUNT(DISTINCT IF(acp=1,nid,NULL)) acp, COUNT(DISTINCT IF(cie=1,nid,NULL)) cie FROM base WHERE fecha IN (SELECT fecha FROM day_periods) GROUP BY c, f, p),
          weekly AS (SELECT 'W' g, c, fuente_id f, ANY_VALUE(fuente) fn, CAST(DATE_TRUNC(fecha, ISOWEEK) AS STRING) p, COUNT(DISTINCT nid) t, COUNT(DISTINCT IF(calificado=1,nid,NULL)) cal, COUNT(DISTINCT IF(asg=1,nid,NULL)) asg, COUNT(DISTINCT IF(cit=1,nid,NULL)) cit, COUNT(DISTINCT IF(vis=1,nid,NULL)) vis, COUNT(DISTINCT IF(apr=1,nid,NULL)) apr, COUNT(DISTINCT IF(acp=1,nid,NULL)) acp, COUNT(DISTINCT IF(cie=1,nid,NULL)) cie FROM base WHERE DATE_TRUNC(fecha, ISOWEEK) IN (SELECT p FROM week_periods) GROUP BY c, f, p),
          commercial AS (SELECT 'C' g, c, fuente_id f, ANY_VALUE(fuente) fn, CAST(DATE_TRUNC(fecha, WEEK(WEDNESDAY)) AS STRING) p, COUNT(DISTINCT nid) t, COUNT(DISTINCT IF(calificado=1,nid,NULL)) cal, COUNT(DISTINCT IF(asg=1,nid,NULL)) asg, COUNT(DISTINCT IF(cit=1,nid,NULL)) cit, COUNT(DISTINCT IF(vis=1,nid,NULL)) vis, COUNT(DISTINCT IF(apr=1,nid,NULL)) apr, COUNT(DISTINCT IF(acp=1,nid,NULL)) acp, COUNT(DISTINCT IF(cie=1,nid,NULL)) cie FROM base WHERE DATE_TRUNC(fecha, WEEK(WEDNESDAY)) IN (SELECT p FROM comm_periods) GROUP BY c, f, p),
          monthly AS (SELECT 'M' g, c, fuente_id f, ANY_VALUE(fuente) fn, FORMAT_DATE('%Y-%m', fecha) p, COUNT(DISTINCT nid) t, COUNT(DISTINCT IF(calificado=1,nid,NULL)) cal, COUNT(DISTINCT IF(asg=1,nid,NULL)) asg, COUNT(DISTINCT IF(cit=1,nid,NULL)) cit, COUNT(DISTINCT IF(vis=1,nid,NULL)) vis, COUNT(DISTINCT IF(apr=1,nid,NULL)) apr, COUNT(DISTINCT IF(acp=1,nid,NULL)) acp, COUNT(DISTINCT IF(cie=1,nid,NULL)) cie FROM base GROUP BY c, f, p),
          quarterly AS (SELECT 'Q' g, c, fuente_id f, ANY_VALUE(fuente) fn, CONCAT(CAST(EXTRACT(YEAR FROM fecha) AS STRING), '-Q', CAST(EXTRACT(QUARTER FROM fecha) AS STRING)) p, COUNT(DISTINCT nid) t, COUNT(DISTINCT IF(calificado=1,nid,NULL)) cal, COUNT(DISTINCT IF(asg=1,nid,NULL)) asg, COUNT(DISTINCT IF(cit=1,nid,NULL)) cit, COUNT(DISTINCT IF(vis=1,nid,NULL)) vis, COUNT(DISTINCT IF(apr=1,nid,NULL)) apr, COUNT(DISTINCT IF(acp=1,nid,NULL)) acp, COUNT(DISTINCT IF(cie=1,nid,NULL)) cie FROM base WHERE DATE_TRUNC(fecha, QUARTER) IN (SELECT p FROM quarter_periods) GROUP BY c, f, p),
          yearly AS (SELECT 'Y' g, c, fuente_id f, ANY_VALUE(fuente) fn, CAST(EXTRACT(YEAR FROM fecha) AS STRING) p, COUNT(DISTINCT nid) t, COUNT(DISTINCT IF(calificado=1,nid,NULL)) cal, COUNT(DISTINCT IF(asg=1,nid,NULL)) asg, COUNT(DISTINCT IF(cit=1,nid,NULL)) cit, COUNT(DISTINCT IF(vis=1,nid,NULL)) vis, COUNT(DISTINCT IF(apr=1,nid,NULL)) apr, COUNT(DISTINCT IF(acp=1,nid,NULL)) acp, COUNT(DISTINCT IF(cie=1,nid,NULL)) cie FROM base GROUP BY c, f, p)
          SELECT * FROM daily UNION ALL SELECT * FROM weekly UNION ALL SELECT * FROM commercial UNION ALL SELECT * FROM monthly UNION ALL SELECT * FROM quarterly UNION ALL SELECT * FROM yearly ORDER BY g, c, f, p
          SQL
          ) > /tmp/funnel_raw.json

      - name: Process funnel data.json
        if: always()
        run: |
          python3 -c "
          import json
          with open('/tmp/funnel_raw.json') as f:
              data = json.load(f)
          for r in data:
              for k in ('f','t','cal','asg','cit','vis','apr','acp','cie'):
                  r[k] = int(r[k])
          with open('tablero-marketing/data.json','w') as f:
              json.dump(data, f, separators=(',',':'))
          print(f'Funnel rows: {len(data)}')
          "

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add incompletos-colombia/data.json tablero-marketing/data.json
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Auto-update data.json $(date -u +%Y-%m-%d)"
            git push
          fi
