<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📢</text></svg>">
<title>Asignados por fecha de creación · CO + MX</title>
<style>
  :root {
    --bg: #0f172a;
    --card: #1e293b;
    --border: #334155;
    --accent: #818cf8;
    --text: #f8fafc;
    --text-secondary: #e2e8f0;
    --muted: #94a3b8;
  }
  * { box-sizing: border-box; }
  html, body { background: var(--bg); color: var(--text); margin: 0; padding: 0; font: 14px/1.45 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
  a { color: var(--accent); text-decoration: none; }
  a:hover { text-decoration: underline; }
  .back-link {
    display: inline-block; padding: 8px 12px; color: var(--muted);
    border: 1px solid var(--border); border-radius: 6px; margin: 12px;
  }
  .back-link:hover { color: var(--text); border-color: var(--accent); text-decoration: none; }
  .container { max-width: 1280px; margin: 0 auto; padding: 12px 24px 48px; }
  header.page { margin: 12px 0 18px; }
  header.page h1 { margin: 0 0 6px; font-size: 22px; }
  header.page p { margin: 0; color: var(--muted); font-size: 13px; }
  .card { background: var(--card); border: 1px solid var(--border); border-radius: 10px; padding: 14px 16px; margin-bottom: 18px; }
  .card h2 { margin: 0 0 10px; font-size: 15px; font-weight: 600; color: var(--text-secondary); }
  .card h3 { margin: 14px 0 8px; font-size: 12px; text-transform: uppercase; letter-spacing: .04em; color: var(--muted); font-weight: 600; }
  .row { display: flex; flex-wrap: wrap; gap: 16px; align-items: center; }
  .chip-group { display: inline-flex; border: 1px solid var(--border); border-radius: 8px; overflow: hidden; }
  .chip { padding: 6px 14px; cursor: pointer; background: transparent; color: var(--text-secondary); border: 0; font-size: 13px; }
  .chip.active { background: var(--accent); color: #0b1224; font-weight: 600; }
  .chip + .chip { border-left: 1px solid var(--border); }
  .btn { padding: 6px 12px; border: 1px solid var(--border); border-radius: 6px; background: transparent; color: var(--text-secondary); cursor: pointer; font-size: 13px; }
  .btn:hover { border-color: var(--accent); color: var(--text); }
  .fuente-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 6px; }
  .fuente-row { display: flex; align-items: center; gap: 8px; font-size: 13px; padding: 4px 0; cursor: pointer; user-select: none; }
  .fuente-row input { width: 16px; height: 16px; accent-color: var(--accent); cursor: pointer; }
  .filter-list { display: flex; flex-direction: column; gap: 6px; }
  .filter-card { display: grid; grid-template-columns: auto 1fr; column-gap: 10px; row-gap: 2px; align-items: start; padding: 8px 10px; border: 1px solid var(--border); border-radius: 8px; cursor: pointer; user-select: none; transition: border-color 0.1s; }
  .filter-card:hover { border-color: var(--accent); }
  .filter-card input { width: 16px; height: 16px; margin-top: 3px; accent-color: var(--accent); cursor: pointer; grid-row: 1 / span 2; }
  .filter-card .filter-main { font-size: 13px; line-height: 1.4; }
  .filter-card .filter-sub { font-size: 12px; line-height: 1.5; grid-column: 2; padding-top: 2px; }
  .gap-table { width: 100%; border-collapse: collapse; font-size: 13px; margin-bottom: 14px; }
  .gap-table th, .gap-table td { padding: 6px 10px; border-bottom: 1px solid var(--border); text-align: left; }
  .gap-table th { font-size: 11px; text-transform: uppercase; letter-spacing: .04em; color: var(--muted); font-weight: 600; }
  .gap-table td.num { text-align: right; font-variant-numeric: tabular-nums; }
  .gap-table .swatch { display: inline-block; width: 12px; height: 12px; border-radius: 3px; vertical-align: -2px; margin-right: 6px; }
  .gap-table .bar-cell { width: 200px; }
  .gap-table .bar { height: 8px; background: var(--border); border-radius: 4px; overflow: hidden; }
  .gap-table .bar-fill { height: 100%; }
  .chart-svg { width: 100%; height: 360px; display: block; }
  .chart-legend { font-size: 12px; color: var(--muted); margin-bottom: 8px; }
  .muted { color: var(--muted); }
  .chart-host { position: relative; }
  .chart-tooltip {
    position: absolute;
    background: #0b1224;
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 8px 12px;
    font-size: 12px;
    color: var(--text);
    box-shadow: 0 4px 16px rgba(0,0,0,0.4);
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.08s;
    z-index: 10;
    min-width: 180px;
  }
  .chart-tooltip.show { opacity: 1; }
  .chart-tooltip .tt-title { font-weight: 600; margin-bottom: 4px; color: var(--text-secondary); }
  .chart-tooltip .tt-row { display: flex; align-items: center; gap: 6px; line-height: 1.5; }
  .chart-tooltip .tt-swatch { width: 10px; height: 10px; border-radius: 2px; flex-shrink: 0; }
  .chart-tooltip .tt-swatch.line { height: 3px; }
  .chart-tooltip .tt-label { color: var(--muted); flex: 1; }
  .chart-tooltip .tt-value { font-variant-numeric: tabular-nums; font-weight: 600; }
  .chart-svg .hover-rect { fill: transparent; cursor: pointer; }
  .chart-svg .hover-rect.active ~ .hover-rect-bg,
  .chart-svg .hover-guide { stroke: var(--muted); stroke-dasharray: 3 3; opacity: 0; }
  .chart-svg .hover-guide.show { opacity: 0.6; }
  /* select-table for canal/plataforma */
  .sel-table { width: 100%; border-collapse: collapse; font-size: 13px; }
  .sel-table th, .sel-table td { padding: 6px 10px; border-bottom: 1px solid var(--border); text-align: left; }
  .sel-table th { font-size: 11px; text-transform: uppercase; letter-spacing: .04em; color: var(--muted); font-weight: 600; }
  .sel-table td.num { text-align: right; font-variant-numeric: tabular-nums; }
  .sel-table tbody tr { cursor: pointer; }
  .sel-table tbody tr:hover { background: #0b1224; }
  .sel-table tbody tr.selected { background: rgba(129, 140, 248, 0.18); }
  .sel-table tbody tr.selected td:first-child { border-left: 3px solid var(--accent); padding-left: 7px; }
  .sel-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  @media (max-width: 720px) { .sel-grid { grid-template-columns: 1fr; } }
  .ue-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; }
  @media (max-width: 720px) { .ue-grid { grid-template-columns: 1fr; } }
  .ue-card { border: 1px solid var(--border); border-radius: 8px; padding: 12px; }
  .ue-card .ue-label { font-size: 11px; text-transform: uppercase; letter-spacing: .04em; color: var(--muted); font-weight: 600; }
  .ue-card .ue-value { font-size: 24px; font-weight: 700; color: var(--text); margin: 4px 0 8px; font-variant-numeric: tabular-nums; }
  .ue-card .ue-spark { width: 100%; height: 60px; }
</style>
</head>
<body>
<a class="back-link" href="../">← Volver (Tableros Marketing Sellers)</a>
<div class="container">
  <header class="page">
    <h1>Asignados por fecha de creación · <span id="header-pais">CO</span></h1>
    <p id="header-meta">Cargando…</p>
  </header>

  <div class="card" id="controls"></div>
  <div class="card" id="filters"></div>
  <div class="card" id="chart"></div>
  <div class="card" id="gap"></div>
  <div class="card" id="canal-section"></div>
</div>

<script>
(async function () {
  const DATA_URL = 'data.json';
  let DATA = null;
  const state = {
    pais: 'CO',
    granularity: 'day',
    fuentes: new Set(),    // filled after load (country-specific)
    filters: new Set(),    // filter ids currently checked
    canal: null,           // single-select or null = total
    plataforma: null,      // single-select or null = total
  };

  function fuentesForPais() {
    return (DATA && DATA.fuentes && DATA.fuentes[state.pais]) || [];
  }

  function resetFuentesForPais() {
    state.fuentes.clear();
    const list = fuentesForPais();
    if (list.includes('WEB')) state.fuentes.add('WEB');
    else for (const f of list) state.fuentes.add(f);
  }

  async function loadData() {
    const res = await fetch(DATA_URL, { cache: 'no-store' });
    if (!res.ok) throw new Error('No pude cargar data.json: ' + res.status);
    DATA = await res.json();
    resetFuentesForPais();
    // filters default: F7-F10 checked
    if (DATA.filters.some(f => f.id === 'F7-F10')) state.filters.add('F7-F10');
  }

  function localeForPais() { return state.pais === 'MX' ? 'es-MX' : 'es-CO'; }
  function fmtN(n) { return n.toLocaleString(localeForPais()); }

  function filtersBitmask() {
    let m = 0;
    for (const f of DATA.filters) {
      if (state.filters.has(f.id)) m |= (1 << f.bit);
    }
    return m;
  }

  function setMeta() {
    const dt = new Date(DATA.updated_at);
    document.getElementById('header-pais').textContent = state.pais;
    document.getElementById('header-meta').textContent =
      `Asignados del WBR mart bucketeados por fecha de creación del lead · Actualizado ${dt.toLocaleString(localeForPais())}`;
  }

  function isoMonday(dateStr) {
    const d = new Date(dateStr + 'T00:00:00Z');
    const day = d.getUTCDay() || 7;
    d.setUTCDate(d.getUTCDate() - day + 1);
    return d.toISOString().slice(0, 10);
  }
  function monthStart(dateStr) { return dateStr.slice(0, 7) + '-01'; }
  function bucket(dateStr) {
    if (state.granularity === 'day') return dateStr;
    if (state.granularity === 'week') return isoMonday(dateStr);
    return monthStart(dateStr);
  }
  function bucketLabel(b) {
    if (state.granularity === 'day') return b.slice(5);
    if (state.granularity === 'week') return 'Sem ' + b.slice(5);
    const [y, m] = b.split('-');
    return ['ene','feb','mar','abr','may','jun','jul','ago','sep','oct','nov','dic'][parseInt(m,10)-1] + ' ' + y.slice(2);
  }
  function currentBucketIsPartial(b) {
    const today = new Date().toISOString().slice(0, 10);
    if (state.granularity === 'day') return b === today;
    if (state.granularity === 'week') return b === isoMonday(today);
    return b === monthStart(today);
  }

  function aggregate() {
    const mart = new Map();
    const filt = new Map();
    const req = filtersBitmask();

    for (const r of DATA.mart_rows) {
      if (r.pais !== state.pais) continue;
      if (!state.fuentes.has(r.f)) continue;
      const b = bucket(r.d);
      mart.set(b, (mart.get(b) || 0) + r.n);
    }
    for (const r of DATA.ever_rows) {
      if (r.pais !== state.pais) continue;
      if (!state.fuentes.has(r.f)) continue;
      // AND: el row pasa sii todos los bits requeridos están presentes.
      if ((r.m & req) !== req) continue;
      const b = bucket(r.d);
      filt.set(b, (filt.get(b) || 0) + r.n);
    }
    return { mart, filt };
  }

  function lastNBuckets(n) {
    const { mart, filt } = aggregate();
    const all = [...new Set([...mart.keys(), ...filt.keys()])].sort();
    const completed = all.filter(b => !currentBucketIsPartial(b));
    return completed.slice(-n).map(b => ({
      b,
      n_mart: mart.get(b) || 0,
      n_filt: filt.get(b) || 0,
    }));
  }

  function redraw() {
    renderChart();
    renderGap();
    renderCanalSection();
  }

  function renderControls() {
    const el = document.getElementById('controls');
    const list = fuentesForPais();
    const fuenteRows = list.map(f => `
      <label class="fuente-row">
        <input type="checkbox" data-fuente="${f}" ${state.fuentes.has(f) ? 'checked' : ''}/>
        ${f}
      </label>
    `).join('');
    const paisChips = (DATA.paises || ['CO']).map(p => `
      <button class="chip ${state.pais === p ? 'active' : ''}" data-pais="${p}">${p}</button>
    `).join('');
    const granChips = `
      <button class="chip ${state.granularity === 'day' ? 'active' : ''}" data-g="day">Día</button>
      <button class="chip ${state.granularity === 'week' ? 'active' : ''}" data-g="week">Semana</button>
      <button class="chip ${state.granularity === 'month' ? 'active' : ''}" data-g="month">Mes</button>
    `;
    el.innerHTML = `
      <div class="row">
        <div>
          <h3 style="margin-top:0">País</h3>
          <div class="chip-group" id="pais">${paisChips}</div>
        </div>
        <div>
          <h3 style="margin-top:0">Granularidad</h3>
          <div class="chip-group" id="granularity">${granChips}</div>
        </div>
        <div style="flex:1; min-width:280px;">
          <h3 style="margin-top:0">Fuentes
            <button class="btn" data-action="all" style="margin-left:8px;">Todas</button>
            <button class="btn" data-action="none">Ninguna</button>
          </h3>
          <div class="fuente-grid">${fuenteRows}</div>
        </div>
      </div>
    `;
    el.querySelectorAll('[data-pais]').forEach(btn => {
      btn.addEventListener('click', () => {
        if (btn.dataset.pais === state.pais) return;
        state.pais = btn.dataset.pais;
        resetFuentesForPais();
        setMeta();
        renderControls();
        redraw();
      });
    });
    el.querySelectorAll('[data-g]').forEach(btn => {
      btn.addEventListener('click', () => {
        state.granularity = btn.dataset.g;
        el.querySelectorAll('[data-g]').forEach(b => b.classList.toggle('active', b === btn));
        redraw();
      });
    });
    el.querySelectorAll('input[data-fuente]').forEach(cb => {
      cb.addEventListener('change', () => {
        const f = cb.dataset.fuente;
        if (cb.checked) state.fuentes.add(f); else state.fuentes.delete(f);
        redraw();
      });
    });
    el.querySelector('[data-action="all"]').addEventListener('click', () => {
      state.fuentes.clear();
      for (const f of fuentesForPais()) state.fuentes.add(f);
      el.querySelectorAll('input[data-fuente]').forEach(cb => cb.checked = true);
      redraw();
    });
    el.querySelector('[data-action="none"]').addEventListener('click', () => {
      state.fuentes.clear();
      el.querySelectorAll('input[data-fuente]').forEach(cb => cb.checked = false);
      redraw();
    });
  }

  function renderFilters() {
    const el = document.getElementById('filters');
    const filterRows = DATA.filters.map(f => {
      const estadosHint = Array.isArray(f.estados)
        ? `<div class="filter-sub muted">${f.estados.map(e => '« ' + e + ' »').join(' &nbsp; ')}</div>`
        : '';
      return `
        <label class="filter-card" title="${f.tooltip.replace(/"/g,'&quot;')}">
          <input type="checkbox" data-fid="${f.id}" ${state.filters.has(f.id) ? 'checked' : ''}/>
          <span class="filter-main"><strong>${f.id}</strong> · ${f.label}</span>
          ${estadosHint}
        </label>
      `;
    }).join('');
    el.innerHTML = `
      <h3 style="margin-top:0">Filtros sobre ever-asignado
        <button class="btn" data-faction="all" style="margin-left:8px;">Todos</button>
        <button class="btn" data-faction="none">Ninguno</button>
      </h3>
      <p class="muted" style="margin:0 0 10px;font-size:12px;">Marca filtros para encoger el universo verde hacia el mart. Todos los filtros marcados se aplican con AND.</p>
      <div class="filter-list">${filterRows}</div>
    `;
    el.querySelectorAll('input[data-fid]').forEach(cb => {
      cb.addEventListener('change', () => {
        const fid = cb.dataset.fid;
        if (cb.checked) state.filters.add(fid); else state.filters.delete(fid);
        renderChart();
      });
    });
    el.querySelector('[data-faction="all"]').addEventListener('click', () => {
      state.filters.clear();
      for (const f of DATA.filters) state.filters.add(f.id);
      el.querySelectorAll('input[data-fid]').forEach(cb => cb.checked = true);
      renderChart();
    });
    el.querySelector('[data-faction="none"]').addEventListener('click', () => {
      state.filters.clear();
      el.querySelectorAll('input[data-fid]').forEach(cb => cb.checked = false);
      renderChart();
    });
  }

  const GAP_COLORS = {
    'F7-F10': '#818cf8',  // indigo
    'F12':    '#22d3ee',  // cyan
    'F15':    '#f472b6',  // pink
    'F3':     '#fb923c',  // orange
    'F11':    '#a78bfa',  // violet
    'Otro':   '#64748b',  // gray
  };

  function aggregateGap() {
    // Returns:
    //   byBucket: Map<period, Map<filter, count>>
    //   filterTotals: Map<filter, total>
    //   periods: sorted array of periods
    const byBucket = new Map();
    const filterTotals = new Map();
    for (const r of DATA.gap_rows) {
      if (r.pais !== state.pais) continue;
      if (!state.fuentes.has(r.f)) continue;
      const b = bucket(r.d);
      if (!byBucket.has(b)) byBucket.set(b, new Map());
      const m = byBucket.get(b);
      m.set(r.bucket, (m.get(r.bucket) || 0) + r.n);
      filterTotals.set(r.bucket, (filterTotals.get(r.bucket) || 0) + r.n);
    }
    return { byBucket, filterTotals };
  }

  function renderGap() {
    const el = document.getElementById('gap');
    const { byBucket, filterTotals } = aggregateGap();
    const periods = [...byBucket.keys()].filter(b => !currentBucketIsPartial(b)).sort();
    const last18 = periods.slice(-18);

    if (last18.length === 0) {
      el.innerHTML = '<h2>Descomposición del gap (ever-asignado pero no en mart)</h2><div class="muted">Sin datos.</div>';
      return;
    }

    // Order bands from largest to smallest, "Otro" forced to the end
    const knownOrder = DATA.gap_band_order.filter(b => b !== 'Otro');
    const ordered = knownOrder
      .map(b => [b, filterTotals.get(b) || 0])
      .sort((a, b) => b[1] - a[1])
      .map(([b]) => b);
    if ([...filterTotals.keys()].includes('Otro')) ordered.push('Otro');

    const totalGap = [...filterTotals.values()].reduce((a, b) => a + b, 0);

    // --- Table ---
    const maxRow = Math.max(1, ...[...filterTotals.values()]);
    const rowsHtml = ordered.map(b => {
      const n = filterTotals.get(b) || 0;
      const pct = totalGap ? (n / totalGap * 100) : 0;
      const barPct = (n / maxRow * 100);
      const color = GAP_COLORS[b] || '#94a3b8';
      return `
        <tr>
          <td><span class="swatch" style="background:${color}"></span><strong>${b}</strong></td>
          <td>${describeBand(b)}</td>
          <td class="num">${n.toLocaleString(localeForPais())}</td>
          <td class="num">${pct.toFixed(1)}%</td>
          <td class="bar-cell"><div class="bar"><div class="bar-fill" style="width:${barPct}%;background:${color}"></div></div></td>
        </tr>
      `;
    }).join('');

    // --- Stacked area chart at 100% ---
    const W = 1180, H = 320, padL = 56, padR = 16, padT = 20, padB = 44;
    const innerW = W - padL - padR, innerH = H - padT - padB;
    const x = i => padL + (last18.length === 1 ? innerW/2 : i * innerW / (last18.length - 1));
    const y = pct => padT + innerH - pct * innerH;  // pct ∈ [0, 1]

    // For each period, compute cumulative shares per band (in `ordered` order)
    const cumulativeByPeriod = last18.map(b => {
      const m = byBucket.get(b) || new Map();
      const total = ordered.reduce((sum, bnd) => sum + (m.get(bnd) || 0), 0) || 1;
      const result = [];
      let cum = 0;
      for (const bnd of ordered) {
        const v = m.get(bnd) || 0;
        const start = cum;
        cum += v / total;
        result.push({ band: bnd, start, end: cum, raw: v, total });
      }
      return result;
    });

    // Build a path per band (closed polygon)
    const bandPaths = ordered.map((bnd, bidx) => {
      const topPoints = cumulativeByPeriod.map((p, i) => x(i) + ',' + y(p[bidx].end));
      const botPoints = cumulativeByPeriod.map((p, i) => x(i) + ',' + y(p[bidx].start)).reverse();
      const d = 'M' + topPoints.join(' L') + ' L' + botPoints.join(' L') + ' Z';
      return `<path d="${d}" fill="${GAP_COLORS[bnd] || '#94a3b8'}" opacity="0.85"/>`;
    }).join('');

    // Y axis (0%, 25%, 50%, 75%, 100%)
    const yEls = [];
    for (let i = 0; i <= 4; i++) {
      const pct = i / 4;
      const yy = y(pct);
      yEls.push(`<line x1="${padL}" y1="${yy}" x2="${W - padR}" y2="${yy}" stroke="#1f2a44" opacity="0.5"/>`);
      yEls.push(`<text x="${padL - 8}" y="${yy + 4}" text-anchor="end" font-size="11" fill="#94a3b8">${pct*100}%</text>`);
    }

    const xTickEvery = last18.length > 12 ? 3 : 2;
    const xEls = last18.map((b, i) => {
      if (i % xTickEvery !== 0 && i !== last18.length - 1) return '';
      return `<text x="${x(i)}" y="${H - padB + 20}" text-anchor="middle" font-size="11" fill="#94a3b8">${bucketLabel(b)}</text>`;
    }).join('');

    // Hover rects for tooltip
    const groupW = innerW / last18.length;
    const hoverRects = last18.map((b, i) => `<rect class="hover-rect" data-idx="${i}" x="${x(i) - groupW/2}" y="${padT}" width="${groupW}" height="${innerH}"/>`).join('');

    const legendHtml = ordered.map(bnd => `
      <span style="margin-right:14px;display:inline-block;">
        <span style="display:inline-block;width:12px;height:10px;background:${GAP_COLORS[bnd]||'#94a3b8'};vertical-align:middle;margin-right:5px;border-radius:2px;"></span>
        ${bnd}
      </span>
    `).join('');

    el.innerHTML = `
      <h2>Descomposición del gap · ¿qué filtro explica las diferencias entre ever-asignado y mart?</h2>
      <p class="muted" style="margin:0 0 12px;font-size:12px;">
        Atribución prioritaria: cada lead del gap (ever-asignado pero no en mart) se asigna al primer filtro que falla, en orden de impacto descendente (F7-F10 → F12 → F15 → F3 → F11 → Otro).
        Total gap en ventana: <strong>${totalGap.toLocaleString(localeForPais())}</strong> leads.
      </p>

      <h3 style="margin:6px 0 8px;">Tabla · contribución total por filtro (ordenada)</h3>
      <table class="gap-table">
        <thead>
          <tr>

  function renderChart() {
    const el = document.getElementById('chart');
    const data = lastNBuckets(18);
    if (data.length === 0 || data.every(d => d.n_mart === 0 && d.n_filt === 0)) {
      el.innerHTML = `<h2>Asignados · últimos 18 ${state.granularity === 'day' ? 'días' : state.granularity === 'week' ? 'semanas' : 'meses'}</h2><div class="muted">Sin datos (¿revisaste que haya al menos una fuente marcada?)</div>`;
      return;
    }
    const martSeries = data.map(d => d.n_mart);
    const filtSeries  = data.map(d => d.n_filt);
    const ratioSeries = data.map(d => d.n_filt > 0 ? d.n_mart / d.n_filt : 0);

    const maxY  = Math.max(1, ...martSeries, ...filtSeries);
    // Ratio puede exceder 1 cuando los filtros aplicados son más estrictos que el mart.
    // maxYR ∈ [1, 1.5] redondeado al 10% más cercano hacia arriba.
    const observedMaxR = Math.max(...ratioSeries, 1);
    const maxYR = Math.min(1.5, Math.ceil(observedMaxR * 10) / 10);

    const W = 1180, H = 380, padL = 60, padR = 60, padT = 20, padB = 44;
    const innerW = W - padL - padR, innerH = H - padT - padB;

    // Center of each period along X
    const xc = i => padL + (data.length === 1 ? innerW/2 : (i + 0.5) * innerW / data.length);
    const y  = v => padT + innerH - (v / maxY) * innerH;
    const yR = v => padT + innerH - (v / maxYR) * innerH;

    // Bar geometry: two grouped bars per period
    const groupW = innerW / data.length;          // total width per period
    const barW   = Math.max(4, groupW * 0.35);    // each bar
    const gap    = groupW * 0.06;
    const offset = (barW + gap) / 2;

    const bars = data.map((d, i) => {
      const cx = xc(i);
      const xMart = cx - offset - barW/2 + offset;  // left bar centered at cx - offset
      const xTig  = cx + offset - barW/2 + offset;  // right
      // simpler: place mart on the left half, tig on the right half
      const x1 = cx - offset - barW/2;
      const x2 = cx + offset - barW/2;
      const yMart = y(d.n_mart), yTig = y(d.n_filt);
      const hMart = padT + innerH - yMart;
      const hTig  = padT + innerH - yTig;
      return `
        <rect x="${x1}" y="${yMart}" width="${barW}" height="${hMart}" fill="var(--accent)" opacity="0.9">
          <title>${d.b} · Mart oficial: ${d.n_mart.toLocaleString(localeForPais())}</title>
        </rect>
        <rect x="${x2}" y="${yTig}" width="${barW}" height="${hTig}" fill="#34d399" opacity="0.9">
          <title>${d.b} · Filtrado: ${d.n_filt.toLocaleString(localeForPais())}</title>
        </rect>
      `;
    }).join('');

    const ratioPath = ratioSeries.map((v, i) => (i ? 'L' : 'M') + xc(i) + ',' + yR(v)).join(' ');
    const ratioDots = data.map((d, i) => {
      const v = ratioSeries[i];
      return `<circle cx="${xc(i)}" cy="${yR(v)}" r="3.5" fill="#fbbf24"><title>${d.b}: ${(v*100).toFixed(1)}% (${d.n_mart.toLocaleString(localeForPais())}/${d.n_filt.toLocaleString(localeForPais())})</title></circle>`;
    }).join('');

    // Y left ticks (counts)
    const yTicks = 5;
    const yEls = [];
    for (let i = 0; i <= yTicks; i++) {
      const v = Math.round((maxY * i) / yTicks);
      const yy = y(v);
      yEls.push(`<line x1="${padL}" y1="${yy}" x2="${W - padR}" y2="${yy}" stroke="#1f2a44"/>`);
      yEls.push(`<text x="${padL - 8}" y="${yy + 4}" text-anchor="end" font-size="11" fill="#94a3b8">${v.toLocaleString(localeForPais())}</text>`);
    }
    // Y right ticks (%)
    const yRTicks = 5;
    const yREls = [];
    for (let i = 0; i <= yRTicks; i++) {
      const v = i / yRTicks;
      const yy = yR(v);
      yREls.push(`<text x="${W - padR + 8}" y="${yy + 4}" text-anchor="start" font-size="11" fill="#94a3b8">${Math.round(v*100)}%</text>`);
    }

    const xTickEvery = data.length > 12 ? 3 : 2;
    const xEls = data.map((d, i) => {
      if (i % xTickEvery !== 0 && i !== data.length - 1) return '';
      return `<text x="${xc(i)}" y="${H - padB + 20}" text-anchor="middle" font-size="11" fill="#94a3b8">${bucketLabel(d.b)}</text>`;
    }).join('');

    const lastIdx = data.length - 1;
    const lastMart = martSeries[lastIdx];
    const lastFilt = filtSeries[lastIdx];
    const lastRatio = ratioSeries[lastIdx];
    const totMart  = martSeries.reduce((a,b) => a+b, 0);
    const totFilt  = filtSeries.reduce((a,b) => a+b, 0);
    const fuentesActivas = [...state.fuentes];
    const ratioTotal = totFilt ? (totMart / totFilt * 100).toFixed(1) : '–';

    // Invisible hover rectangles spanning full height per period (capture pointer events)
    const hoverRects = data.map((d, i) => {
      const cx = xc(i);
      const w = groupW;
      return `<rect class="hover-rect" data-idx="${i}" x="${cx - w/2}" y="${padT}" width="${w}" height="${innerH}" />`;
    }).join('');

    el.innerHTML = `
      <h2>Asignados · últimos 18 ${state.granularity === 'day' ? 'días' : state.granularity === 'week' ? 'semanas' : 'meses'}</h2>
      <div class="chart-legend">
        <span style="display:inline-block;width:12px;height:10px;background:var(--accent);vertical-align:middle;margin-right:5px;border-radius:2px;"></span>
        <strong>Mart oficial</strong> · último ${lastMart.toLocaleString(localeForPais())} · total ${totMart.toLocaleString(localeForPais())}
        &nbsp;|&nbsp;
        <span style="display:inline-block;width:12px;height:10px;background:#34d399;vertical-align:middle;margin-right:5px;border-radius:2px;"></span>
        <strong>Ever-asignado${state.filters.size ? ` + ${state.filters.size} filtro${state.filters.size > 1 ? 's' : ''}` : ''}</strong> · último ${lastFilt.toLocaleString(localeForPais())} · total ${totFilt.toLocaleString(localeForPais())}
        &nbsp;|&nbsp;
        <span style="display:inline-block;width:14px;height:3px;background:#fbbf24;vertical-align:middle;margin-right:5px;"></span>
        <strong>% Mart/Filtrado</strong> · último ${(lastRatio*100).toFixed(1)}% · total ${ratioTotal}%
        &nbsp;|&nbsp;
        Fuentes (${fuentesActivas.length}/${fuentesForPais().length}): ${fuentesActivas.length === fuentesForPais().length ? 'Todas' : fuentesActivas.join(', ') || 'Ninguna'}
      </div>
      <div class="chart-host">
        <svg class="chart-svg" viewBox="0 0 ${W} ${H}" preserveAspectRatio="none">
          ${yEls.join('')}
          ${bars}
          <path d="${ratioPath}" stroke="#fbbf24" stroke-width="2" fill="none"/>
          ${ratioDots}
          ${yREls.join('')}
          ${xEls}
          <line class="hover-guide" id="hover-guide" x1="0" y1="${padT}" x2="0" y2="${padT + innerH}" stroke="#94a3b8" stroke-dasharray="3 3"/>
          ${hoverRects}
        </svg>
        <div class="chart-tooltip" id="chart-tooltip"></div>
      </div>
    `;

    // Wire up tooltip behaviour
    const svg = el.querySelector('svg');
    const host = el.querySelector('.chart-host');
    const tip = el.querySelector('#chart-tooltip');
    const guide = el.querySelector('#hover-guide');
    const rects = el.querySelectorAll('.hover-rect');

    function pxFromViewbox(xVB) {
      // Convert SVG viewBox x to pixel offset inside the host
      const rect = svg.getBoundingClientRect();
      return rect.left - host.getBoundingClientRect().left + (xVB / W) * rect.width;
    }

    rects.forEach(r => {
      r.addEventListener('mouseenter', () => {
        const i = parseInt(r.dataset.idx, 10);
        const d = data[i];
        const ratioPct = d.n_filt > 0 ? (d.n_mart / d.n_filt * 100).toFixed(1) : '–';
        const filtLabel = state.filters.size ? `Ever + ${state.filters.size} filtro${state.filters.size > 1 ? 's' : ''}` : 'Ever-asignado';
        tip.innerHTML = `
          <div class="tt-title">${d.b}</div>
          <div class="tt-row">
            <span class="tt-swatch" style="background:var(--accent)"></span>
            <span class="tt-label">Mart oficial</span>
            <span class="tt-value">${d.n_mart.toLocaleString(localeForPais())}</span>
          </div>
          <div class="tt-row">
            <span class="tt-swatch" style="background:#34d399"></span>
            <span class="tt-label">${filtLabel}</span>
            <span class="tt-value">${d.n_filt.toLocaleString(localeForPais())}</span>
          </div>
          <div class="tt-row">
            <span class="tt-swatch line" style="background:#fbbf24"></span>
            <span class="tt-label">% Mart/Filtrado</span>
            <span class="tt-value">${ratioPct}${ratioPct !== '–' ? '%' : ''}</span>
          </div>
          <div class="tt-row" style="margin-top:4px;border-top:1px solid var(--border);padding-top:4px;">
            <span class="tt-label">Gap (Filtrado − Mart)</span>
            <span class="tt-value">${(d.n_filt - d.n_mart).toLocaleString(localeForPais())}</span>
          </div>
        `;
        guide.setAttribute('x1', xc(i));
        guide.setAttribute('x2', xc(i));
        guide.classList.add('show');
        tip.classList.add('show');
      });
      r.addEventListener('mousemove', (e) => {
        const hostRect = host.getBoundingClientRect();
        const px = e.clientX - hostRect.left;
        const py = e.clientY - hostRect.top;
        const tipW = tip.offsetWidth || 200;
        // Place to the right of cursor by default; flip to left when near right edge
        let left = px + 14;
        if (left + tipW > hostRect.width - 8) left = px - tipW - 14;
        tip.style.left = Math.max(4, left) + 'px';
        tip.style.top  = Math.max(4, py - 10) + 'px';
      });
      r.addEventListener('mouseleave', () => {
        tip.classList.remove('show');
        guide.classList.remove('show');
      });
    });
  }

  // ===== Canal section (volumen / click-to-lead / unit economics) =====
  function canalAvailableForPais() {
    return (DATA && DATA.canales && DATA.canales[state.pais]) || [];
  }
  function plataformaAvailableForPais() {
    return (DATA && DATA.plataformas && DATA.plataformas[state.pais]) || [];
  }

  function rowMatchesUpstream(r) {
    // pais + fuentes (multi-select). Used for canal table (no canal/plataforma filter).
    return r.pais === state.pais && state.fuentes.has(r.f);
  }
  function rowMatchesCanal(r) {
    return rowMatchesUpstream(r) && (state.canal == null || r.c === state.canal);
  }
  function rowMatchesPlataforma(r) {
    return rowMatchesCanal(r) && (state.plataforma == null || r.p === state.plataforma);
  }

  function aggregateCanalTable() {
    // Aggregates rows by canal (respects fuentes + pais only)
    const m = new Map(); // canal → {leads, spend, clicks}
    for (const r of DATA.leads_attr_rows) {
      if (!rowMatchesUpstream(r) || !r.c) continue;
      const x = m.get(r.c) || {leads: 0, spend: 0, clicks: 0};
      x.leads += r.n;
      m.set(r.c, x);
    }
    for (const r of DATA.spend_rows) {
      if (!rowMatchesUpstream(r) || !r.c) continue;
      const x = m.get(r.c) || {leads: 0, spend: 0, clicks: 0};
      x.spend  += r.s;
      x.clicks += r.k;
      m.set(r.c, x);
    }
    const arr = [...m.entries()].map(([canal, v]) => ({canal, ...v}));
    arr.sort((a, b) => b.leads - a.leads || b.spend - a.spend);
    return arr;
  }

  function aggregatePlataformaTable() {
    // Aggregates rows by plataforma (respects fuentes + pais + canal)
    const m = new Map();
    for (const r of DATA.leads_attr_rows) {
      if (!rowMatchesCanal(r) || !r.p) continue;
      const x = m.get(r.p) || {leads: 0, spend: 0, clicks: 0};
      x.leads += r.n;
      m.set(r.p, x);
    }
    for (const r of DATA.spend_rows) {
      if (!rowMatchesCanal(r) || !r.p) continue;
      const x = m.get(r.p) || {leads: 0, spend: 0, clicks: 0};
      x.spend  += r.s;
      x.clicks += r.k;
      m.set(r.p, x);
    }
    const arr = [...m.entries()].map(([plataforma, v]) => ({plataforma, ...v}));
    arr.sort((a, b) => b.leads - a.leads || b.spend - a.spend);
    return arr;
  }

  function aggregateCanalSeries() {
    // Returns map<bucket, {leads, spend, clicks, impressions}> respecting all 4 filters.
    const m = new Map();
    for (const r of DATA.leads_attr_rows) {
      if (!rowMatchesPlataforma(r)) continue;
      const b = bucket(r.d);
      const x = m.get(b) || {leads: 0, spend: 0, clicks: 0, impressions: 0};
      x.leads += r.n;
      m.set(b, x);
    }
    for (const r of DATA.spend_rows) {
      if (!rowMatchesPlataforma(r)) continue;
      const b = bucket(r.d);
      const x = m.get(b) || {leads: 0, spend: 0, clicks: 0, impressions: 0};
      x.spend       += r.s;
      x.clicks      += r.k;
      x.impressions += r.i;
      m.set(b, x);
    }
    return m;
  }

  function ensureSelectionStillValid() {
    // If state.canal not in current canal table, deselect it (and plataforma).
    const canalSet = new Set(aggregateCanalTable().map(x => x.canal));
    if (state.canal && !canalSet.has(state.canal)) {
      state.canal = null;
      state.plataforma = null;
      return;
    }
    const platSet = new Set(aggregatePlataformaTable().map(x => x.plataforma));
    if (state.plataforma && !platSet.has(state.plataforma)) {
      state.plataforma = null;
    }
  }

  function fmtMoney(v) {
    if (!isFinite(v) || v == null) return '–';
    if (v >= 1e6) return (v/1e6).toFixed(1) + 'M';
    if (v >= 1e3) return (v/1e3).toFixed(1) + 'k';
    return v.toFixed(0);
  }
  function fmtPct(p) {
    if (!isFinite(p) || p == null) return '–';
    return p.toFixed(2) + '%';
  }

  function lastNCanalBuckets(n) {
    const m = aggregateCanalSeries();
    const keys = [...m.keys()].filter(b => !currentBucketIsPartial(b)).sort();
    return keys.slice(-n).map(b => ({b, ...m.get(b)}));
  }

  function renderSparkline(data, key, color, opts = {}) {
    if (!data.length) return '';
    const W = 240, H = 60, padT = 6, padB = 8;
    const innerH = H - padT - padB;
    const vals = data.map(d => d[key] || 0);
    const maxV = Math.max(1, ...vals);
    const x = i => data.length === 1 ? W/2 : (i * W) / (data.length - 1);
    const y = v => padT + innerH - (v / maxV) * innerH;
    const pts = data.map((d, i) => x(i) + ',' + y(d[key] || 0)).join(' ');
    const last = vals[vals.length - 1] || 0;
    return `<svg class="ue-spark" viewBox="0 0 ${W} ${H}" preserveAspectRatio="none">
      <polyline points="${pts}" fill="none" stroke="${color}" stroke-width="2"/>
      <circle cx="${x(data.length-1)}" cy="${y(last)}" r="3" fill="${color}"/>
    </svg>`;
  }

    const cpc = totals.clicks > 0 ? totals.spend / totals.clicks : null;
    const cpl = totals.leads  > 0 ? totals.spend / totals.leads  : null;
    const ctr = totals.impressions > 0 ? totals.clicks / totals.impressions * 100 : null;

    const activos = [
      `País ${state.pais}`,
      `Fuentes ${state.fuentes.size === fuentesForPais().length ? 'todas' : (state.fuentes.size ? [...state.fuentes].join('+') : 'ninguna')}`,
      state.canal      ? `Canal ${state.canal}`           : 'Canal cualquiera',
      state.plataforma ? `Plataforma ${state.plataforma}` : 'Plataforma cualquiera',
    ].join(' · ');

    el.innerHTML = `
      <h2>Detalle por canal de inversión</h2>

        <strong>Click-to-Lead</strong> aplica solo sobre leads con UTM populated (los Direct / sin tracking no entran).
        Se respetan los filtros de arriba (País, Fuentes) más las selecciones de Canal y Plataforma de abajo.
      </p>
      <p class="muted" style="margin:0 0 12px;font-size:12px;">
        <em>Filtros activos:</em> ${activos}
      </p>

      <div class="sel-grid">
        <div>
          <h3 style="margin-top:0">Canal · click para single-select / re-click deselecciona</h3>
          <table class="sel-table" id="canal-sel">
            <thead><tr><th>Canal</th><th class="num">Leads (UTM)</th><th class="num">Spend</th><th class="num">Clicks</th></tr></thead>
            <tbody>${canalRowsHtml}</tbody>
          </table>
        </div>
        <div>
          <h3 style="margin-top:0">Plataforma · single-select / re-click deselecciona</h3>
          <table class="sel-table" id="plat-sel">
            <thead><tr><th>Plataforma</th><th class="num">Leads (UTM)</th><th class="num">Spend</th><th class="num">Clicks</th></tr></thead>
            <tbody>${platRowsHtml}</tbody>
          </table>

      <h3 style="margin:18px 0 6px;">Volumen · spend / clicks / impressions por período</h3>
      <div id="canal-vol-chart"></div>

      <h3 style="margin:18px 0 6px;">Click-to-Lead · clicks vs leads atribuidos + ratio %</h3>
      <div id="canal-ctl-chart"></div>

      <h3 style="margin:18px 0 6px;">Unit economics · últimos 18 ${state.granularity === 'day' ? 'días' : state.granularity === 'week' ? 'semanas' : 'meses'}</h3>
      <div class="ue-grid">
        <div class="ue-card">
          <div class="ue-label">CPC · Spend / Clicks</div>
          <div class="ue-value">${cpc != null ? '$' + fmtMoney(cpc) : '–'}</div>
          ${renderSparkline(series.map(d => ({v: d.clicks > 0 ? d.spend / d.clicks : 0})), 'v', '#fbbf24')}
        </div>
        <div class="ue-card">
          <div class="ue-label">CPL · Spend / Leads (registros)</div>
          <div class="ue-value">${cpl != null ? '$' + fmtMoney(cpl) : '–'}</div>
          ${renderSparkline(series.map(d => ({v: d.leads > 0 ? d.spend / d.leads : 0})), 'v', '#34d399')}
        </div>
        <div class="ue-card">
          <div class="ue-label">CTR · Clicks / Impressions</div>
          <div class="ue-value">${fmtPct(ctr)}</div>
          ${renderSparkline(series.map(d => ({v: d.impressions > 0 ? d.clicks / d.impressions * 100 : 0})), 'v', '#22d3ee')}
        </div>
      </div>
    `;

    // Volumen chart
    renderVolChart(document.getElementById('canal-vol-chart'), series);
    // Click-to-Lead chart
    renderCtlChart(document.getElementById('canal-ctl-chart'), series);

    // Wire row clicks
    el.querySelectorAll('#canal-sel tbody tr').forEach(tr => {
      tr.addEventListener('click', () => {
        const c = tr.dataset.canal;
        if (!c) return;
        state.canal = (state.canal === c) ? null : c;
        state.plataforma = null;  // resetting canal also clears platform
        renderCanalSection();
      });
    });
    el.querySelectorAll('#plat-sel tbody tr').forEach(tr => {
      tr.addEventListener('click', () => {
        const p = tr.dataset.plat;
        if (!p) return;
        state.plataforma = (state.plataforma === p) ? null : p;
        renderCanalSection();
      });
    });
  }

  function renderVolChart(host, series) {
    if (!series.length || series.every(d => !d.spend && !d.clicks && !d.impressions)) {
      host.innerHTML = '<div class="muted">Sin datos para los filtros seleccionados.</div>';
      return;
    }
    const W = 1180, H = 320, padL = 60, padR = 60, padT = 16, padB = 40;
    const innerW = W - padL - padR, innerH = H - padT - padB;
    const xc = i => padL + (series.length === 1 ? innerW/2 : (i + 0.5) * innerW / series.length);
    const maxLeft = Math.max(1, ...series.map(d => Math.max(d.spend, d.clicks)));
    const maxRight = Math.max(1, ...series.map(d => d.impressions));
    const yL = v => padT + innerH - (v / maxLeft) * innerH;
    const yR = v => padT + innerH - (v / maxRight) * innerH;
    const groupW = innerW / series.length;
    const barW = Math.max(3, groupW * 0.30);
    const offset = (barW + groupW * 0.05) / 2;

    const bars = series.map((d, i) => {
      const cx = xc(i);
      const x1 = cx - offset - barW/2, x2 = cx + offset - barW/2;
      const ys = yL(d.spend), yk = yL(d.clicks);
      return `
        <rect x="${x1}" y="${ys}" width="${barW}" height="${padT+innerH-ys}" fill="#fbbf24" opacity="0.9"><title>${d.b} · Spend: ${fmtMoney(d.spend)}</title></rect>
        <rect x="${x2}" y="${yk}" width="${barW}" height="${padT+innerH-yk}" fill="#22d3ee" opacity="0.9"><title>${d.b} · Clicks: ${fmtN(Math.round(d.clicks))}</title></rect>
      `;
    }).join('');
    const impPath = series.map((d, i) => (i ? 'L' : 'M') + xc(i) + ',' + yR(d.impressions)).join(' ');
    const impDots = series.map((d, i) => `<circle cx="${xc(i)}" cy="${yR(d.impressions)}" r="3" fill="#a78bfa"><title>${d.b} · Impressions: ${fmtMoney(d.impressions)}</title></circle>`).join('');

    const yTicks = 4;
    const yEls = [];
    for (let i = 0; i <= yTicks; i++) {
      const v = (maxLeft * i) / yTicks;
      const yy = yL(v);
      yEls.push(`<line x1="${padL}" y1="${yy}" x2="${W-padR}" y2="${yy}" stroke="#1f2a44"/>`);
      yEls.push(`<text x="${padL-8}" y="${yy+4}" text-anchor="end" font-size="11" fill="#94a3b8">${fmtMoney(v)}</text>`);
    }
    const yREls = [];
    for (let i = 0; i <= yTicks; i++) {
      const v = (maxRight * i) / yTicks;
      const yy = yR(v);
      yREls.push(`<text x="${W-padR+8}" y="${yy+4}" text-anchor="start" font-size="11" fill="#94a3b8">${fmtMoney(v)}</text>`);
    }
    const xTickEvery = series.length > 12 ? 3 : 2;
    const xEls = series.map((d, i) => (i % xTickEvery !== 0 && i !== series.length - 1) ? '' :
      `<text x="${xc(i)}" y="${H-padB+18}" text-anchor="middle" font-size="11" fill="#94a3b8">${bucketLabel(d.b)}</text>`).join('');

    host.innerHTML = `
      <div class="chart-legend">
        <span style="display:inline-block;width:12px;height:10px;background:#fbbf24;vertical-align:middle;margin-right:5px;border-radius:2px;"></span><strong>Spend (izq)</strong>
        &nbsp;|&nbsp;
        <span style="display:inline-block;width:12px;height:10px;background:#22d3ee;vertical-align:middle;margin-right:5px;border-radius:2px;"></span><strong>Clicks (izq)</strong>
        &nbsp;|&nbsp;
        <span style="display:inline-block;width:14px;height:3px;background:#a78bfa;vertical-align:middle;margin-right:5px;"></span><strong>Impressions (der)</strong>
      </div>
      <svg class="chart-svg" viewBox="0 0 ${W} ${H}" preserveAspectRatio="none" style="height:${H}px;">
        ${yEls.join('')}
        ${bars}
        <path d="${impPath}" stroke="#a78bfa" stroke-width="2" fill="none"/>
        ${impDots}
        ${yREls.join('')}
        ${xEls}
      </svg>
    `;
  }

  function renderCtlChart(host, series) {
    if (!series.length || series.every(d => !d.clicks && !d.leads)) {
      host.innerHTML = '<div class="muted">Sin datos para los filtros seleccionados.</div>';
      return;
    }
    const W = 1180, H = 320, padL = 60, padR = 60, padT = 16, padB = 40;
    const innerW = W - padL - padR, innerH = H - padT - padB;
    const xc = i => padL + (series.length === 1 ? innerW/2 : (i + 0.5) * innerW / series.length);
    const maxLeft = Math.max(1, ...series.map(d => Math.max(d.clicks, d.leads)));
    const ratioSeries = series.map(d => d.clicks > 0 ? d.leads / d.clicks * 100 : 0);
    const maxRight = Math.max(1, ...ratioSeries);
    const yL = v => padT + innerH - (v / maxLeft) * innerH;
    const yR = v => padT + innerH - (v / maxRight) * innerH;
    const groupW = innerW / series.length;
    const barW = Math.max(3, groupW * 0.30);
    const offset = (barW + groupW * 0.05) / 2;

    const bars = series.map((d, i) => {
      const cx = xc(i);
      const x1 = cx - offset - barW/2, x2 = cx + offset - barW/2;
      const yk = yL(d.clicks), yl = yL(d.leads);
      const ratio = d.clicks > 0 ? (d.leads / d.clicks * 100).toFixed(2) : '–';
      return `
        <rect x="${x1}" y="${yk}" width="${barW}" height="${padT+innerH-yk}" fill="#22d3ee" opacity="0.9"><title>${d.b} · Clicks: ${fmtN(Math.round(d.clicks))}</title></rect>
        <rect x="${x2}" y="${yl}" width="${barW}" height="${padT+innerH-yl}" fill="#34d399" opacity="0.9"><title>${d.b} · Leads: ${fmtN(d.leads)} · Ratio ${ratio}%</title></rect>
      `;
    }).join('');

    const ratioPath = series.map((d, i) => (i ? 'L' : 'M') + xc(i) + ',' + yR(ratioSeries[i])).join(' ');
    const ratioDots = series.map((d, i) => `<circle cx="${xc(i)}" cy="${yR(ratioSeries[i])}" r="3" fill="#fb923c"><title>${d.b} · Click-to-Lead ${ratioSeries[i].toFixed(2)}%</title></circle>`).join('');

    const yTicks = 4;
    const yEls = [];
    for (let i = 0; i <= yTicks; i++) {
      const v = (maxLeft * i) / yTicks;
      const yy = yL(v);
      yEls.push(`<line x1="${padL}" y1="${yy}" x2="${W-padR}" y2="${yy}" stroke="#1f2a44"/>`);
      yEls.push(`<text x="${padL-8}" y="${yy+4}" text-anchor="end" font-size="11" fill="#94a3b8">${fmtMoney(v)}</text>`);
    }
    const yREls = [];
    for (let i = 0; i <= yTicks; i++) {
      const v = (maxRight * i) / yTicks;
      const yy = yR(v);
      yREls.push(`<text x="${W-padR+8}" y="${yy+4}" text-anchor="start" font-size="11" fill="#94a3b8">${v.toFixed(1)}%</text>`);
    }
    const xTickEvery = series.length > 12 ? 3 : 2;
    const xEls = series.map((d, i) => (i % xTickEvery !== 0 && i !== series.length - 1) ? '' :
      `<text x="${xc(i)}" y="${H-padB+18}" text-anchor="middle" font-size="11" fill="#94a3b8">${bucketLabel(d.b)}</text>`).join('');

    host.innerHTML = `
      <div class="chart-legend">
        <span style="display:inline-block;width:12px;height:10px;background:#22d3ee;vertical-align:middle;margin-right:5px;border-radius:2px;"></span><strong>Clicks</strong>
        &nbsp;|&nbsp;
        <span style="display:inline-block;width:12px;height:10px;background:#34d399;vertical-align:middle;margin-right:5px;border-radius:2px;"></span><strong>Leads atribuidos</strong>
        &nbsp;|&nbsp;
        <span style="display:inline-block;width:14px;height:3px;background:#fb923c;vertical-align:middle;margin-right:5px;"></span><strong>Click-to-Lead %</strong>
      </div>
      <svg class="chart-svg" viewBox="0 0 ${W} ${H}" preserveAspectRatio="none" style="height:${H}px;">
        ${yEls.join('')}
        ${bars}
        <path d="${ratioPath}" stroke="#fb923c" stroke-width="2" fill="none"/>
        ${ratioDots}
        ${yREls.join('')}
        ${xEls}
      </svg>
    `;
  }

  try {
    await loadData();
    setMeta();
    renderControls();
    renderFilters();
    renderChart();
    renderGap();
    renderCanalSection();
  } catch (e) {
    document.getElementById('header-meta').textContent = 'Error: ' + e.message;
    console.error(e);
  }
})();
</script>
</body>
</html>
