<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📢</text></svg>">
<title>Calificados MM vs Inmo · CO + MX</title>
<style>
  :root {
    --bg: #0f172a;
    --card: #1e293b;
    --border: #334155;
    --accent: #818cf8;
    --text: #f8fafc;
    --text-secondary: #e2e8f0;
    --muted: #94a3b8;
  }
  * { box-sizing: border-box; }
  html, body { background: var(--bg); color: var(--text); margin: 0; padding: 0; font: 14px/1.45 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
  a { color: var(--accent); text-decoration: none; }
  a:hover { text-decoration: underline; }
  .back-link {
    display: inline-block; padding: 8px 12px; color: var(--muted);
    border: 1px solid var(--border); border-radius: 6px; margin: 12px;
  }
  .back-link:hover { color: var(--text); border-color: var(--accent); text-decoration: none; }
  .container { max-width: 1280px; margin: 0 auto; padding: 12px 24px 48px; }
  header.page { margin: 12px 0 18px; }
  header.page h1 { margin: 0 0 6px; font-size: 22px; }
  header.page p { margin: 0; color: var(--muted); font-size: 13px; }
  .card { background: var(--card); border: 1px solid var(--border); border-radius: 10px; padding: 14px 16px; margin-bottom: 18px; }
  .card h2 { margin: 0 0 10px; font-size: 15px; font-weight: 600; color: var(--text-secondary); }
  .card h3 { margin: 14px 0 8px; font-size: 12px; text-transform: uppercase; letter-spacing: .04em; color: var(--muted); font-weight: 600; }
  .row { display: flex; flex-wrap: wrap; gap: 16px; align-items: center; }
  .chip-group { display: inline-flex; border: 1px solid var(--border); border-radius: 8px; overflow: hidden; }
  .chip { padding: 6px 14px; cursor: pointer; background: transparent; color: var(--text-secondary); border: 0; font-size: 13px; }
  .chip.active { background: var(--accent); color: #0b1224; font-weight: 600; }
  .chip + .chip { border-left: 1px solid var(--border); }
  .btn { padding: 6px 12px; border: 1px solid var(--border); border-radius: 6px; background: transparent; color: var(--text-secondary); cursor: pointer; font-size: 13px; }
  .btn:hover { border-color: var(--accent); color: var(--text); }
  .fuente-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 6px; }
  .fuente-row { display: flex; align-items: center; gap: 8px; font-size: 13px; padding: 4px 0; cursor: pointer; user-select: none; }
  .fuente-row input { width: 16px; height: 16px; accent-color: var(--accent); cursor: pointer; }
  .chart-svg { width: 100%; height: 420px; display: block; }
  .chart-legend { font-size: 12px; color: var(--muted); margin-bottom: 8px; }
  .muted { color: var(--muted); }
  .chart-host { position: relative; }
  .chart-tooltip {
    position: absolute; background: #0b1224; border: 1px solid var(--border);
    border-radius: 8px; padding: 8px 12px; font-size: 12px; color: var(--text);
    box-shadow: 0 4px 16px rgba(0,0,0,0.4); pointer-events: none; opacity: 0;
    transition: opacity 0.08s; z-index: 10; min-width: 200px;
  }
  .chart-tooltip.show { opacity: 1; }
  .chart-tooltip .tt-title { font-weight: 600; margin-bottom: 4px; color: var(--text-secondary); }
  .chart-tooltip .tt-row { display: flex; align-items: center; gap: 6px; line-height: 1.5; }
  .chart-tooltip .tt-swatch { width: 10px; height: 10px; border-radius: 2px; flex-shrink: 0; }
  .chart-tooltip .tt-swatch.line { height: 3px; }
  .chart-tooltip .tt-label { color: var(--muted); flex: 1; }
  .chart-tooltip .tt-value { font-variant-numeric: tabular-nums; font-weight: 600; }
  .chart-svg .hover-rect { fill: transparent; cursor: pointer; }
  .chart-svg .hover-guide { stroke: var(--muted); stroke-dasharray: 3 3; opacity: 0; }
  .chart-svg .hover-guide.show { opacity: 0.6; }
</style>
</head>
<body>
<a class="back-link" href="../">← Volver (Tableros Marketing Sellers)</a>
<div class="container">
  <header class="page">
    <h1>Calificados · MM vs Inmo · <span id="header-pais">CO</span></h1>
    <p id="header-meta">Cargando…</p>
  </header>

  <div class="card" id="controls"></div>
  <div class="card" id="chart"></div>
  <div class="card" id="cvr-chart"></div>
</div>

<script>
(async function () {
  const DATA_URL = 'data.json';
  let DATA = null;
  const state = {
    pais: 'CO',
    granularity: 'week',     // 'day' | 'week' | 'month'
    fuentes: new Set(),
  };
  // Cuántos buckets mostrar al final, por granularidad:
  const N_BUCKETS = { day: 60, week: 52, month: 18 };

  function fuentesForPais() {
    return (DATA && DATA.fuentes && DATA.fuentes[state.pais]) || [];
  }
  function resetFuentesForPais() {
    state.fuentes.clear();
    for (const f of fuentesForPais()) state.fuentes.add(f);
  }

  async function loadData() {
    const res = await fetch(DATA_URL, { cache: 'no-store' });
    if (!res.ok) throw new Error('No pude cargar data.json: ' + res.status);
    DATA = await res.json();
    resetFuentesForPais();
  }

  function localeForPais() { return state.pais === 'MX' ? 'es-MX' : 'es-CO'; }
  function fmtN(n) { return Math.round(n).toLocaleString(localeForPais()); }
  function fmtPct(p) { return (p * 100).toFixed(1) + '%'; }

  function setMeta() {
    const dt = new Date(DATA.updated_at);
    document.getElementById('header-pais').textContent = state.pais;
    const granLabel = state.granularity === 'day' ? 'día' : state.granularity === 'week' ? 'semana' : 'mes';
    document.getElementById('header-meta').textContent =
      `Calificados Inmo + MM (barras) + ratio Inmo / MM (línea). Cohort por fecha de registro · granularidad ${granLabel} · 52 semanas de historia · Actualizado ${dt.toLocaleString(localeForPais())}`;
  }

  function escapeHtml(s) { return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

  function isoMonday(dateStr) {
    const d = new Date(dateStr + 'T00:00:00Z');
    const day = d.getUTCDay() || 7;
    d.setUTCDate(d.getUTCDate() - day + 1);
    return d.toISOString().slice(0, 10);
  }
  function monthStart(dateStr) { return dateStr.slice(0, 7) + '-01'; }
  function bucketKey(dateStr) {
    if (state.granularity === 'day')  return dateStr;
    if (state.granularity === 'week') return isoMonday(dateStr);
    return monthStart(dateStr);
  }
  function bucketLabel(b) {
    if (state.granularity === 'day')  return b.slice(5);                 // MM-DD
    if (state.granularity === 'week') return 'Sem ' + b.slice(5);        // Sem MM-DD
    const [y, m] = b.split('-');
    const monthAbbrev = ['ene','feb','mar','abr','may','jun','jul','ago','sep','oct','nov','dic'][parseInt(m,10) - 1];
    return monthAbbrev + ' ' + y.slice(2);
  }

  function aggregate() {
    // Agrupa por bucket (day/week/month), sumando fuentes seleccionadas y país activo
    const m = new Map();
    for (const r of DATA.rows) {
      if (r.pais !== state.pais) continue;
      if (!state.fuentes.has(r.f)) continue;
      const k = bucketKey(r.d);
      const x = m.get(k) || { reg:0, calif_inmo:0, calif_mm:0, calif_both:0 };
      x.reg        += r.reg;
      x.calif_inmo += r.calif_inmo;
      x.calif_mm   += r.calif_mm;
      x.calif_both += r.calif_both;
      m.set(k, x);
    }
    const arr = [...m.entries()].sort((a,b) => a[0].localeCompare(b[0])).map(([week, v]) => ({ week, ...v }));
    // Limitar a últimos N buckets según granularidad
    return arr.slice(-N_BUCKETS[state.granularity]);
  }

  function renderControls() {
    const el = document.getElementById('controls');
    const list = fuentesForPais();
    const fuenteRows = list.map(f => `
      <label class="fuente-row">
        <input type="checkbox" data-fuente="${f}" ${state.fuentes.has(f) ? 'checked' : ''}/>
        ${f}
      </label>
    `).join('');
    const paisChips = (DATA.paises || ['CO']).map(p => `
      <button class="chip ${state.pais === p ? 'active' : ''}" data-pais="${p}">${p}</button>
    `).join('');
    const granChips = `
      <button class="chip ${state.granularity === 'day'   ? 'active' : ''}" data-g="day">Día</button>
      <button class="chip ${state.granularity === 'week'  ? 'active' : ''}" data-g="week">Semana</button>
      <button class="chip ${state.granularity === 'month' ? 'active' : ''}" data-g="month">Mes</button>
    `;
    el.innerHTML = `
      <div class="row">
        <div>
          <h3 style="margin-top:0">País</h3>
          <div class="chip-group" id="pais">${paisChips}</div>
        </div>
        <div>
          <h3 style="margin-top:0">Granularidad</h3>
          <div class="chip-group" id="granularity">${granChips}</div>
        </div>
        <div style="flex:1; min-width:280px;">
          <h3 style="margin-top:0">Fuentes
            <button class="btn" data-action="all" style="margin-left:8px;">Todas</button>
            <button class="btn" data-action="none">Ninguna</button>
          </h3>
          <div class="fuente-grid">${fuenteRows}</div>
        </div>
      </div>
    `;
    el.querySelectorAll('[data-pais]').forEach(btn => {
      btn.addEventListener('click', () => {
        if (btn.dataset.pais === state.pais) return;
        state.pais = btn.dataset.pais;
        resetFuentesForPais();
        setMeta();
        renderControls();
        redraw();
      });
    });
    el.querySelectorAll('[data-g]').forEach(btn => {
      btn.addEventListener('click', () => {
        if (btn.dataset.g === state.granularity) return;
        state.granularity = btn.dataset.g;
        setMeta();
        el.querySelectorAll('[data-g]').forEach(b => b.classList.toggle('active', b === btn));
        redraw();
      });
    });
    el.querySelectorAll('input[data-fuente]').forEach(cb => {
      cb.addEventListener('change', () => {
        const f = cb.dataset.fuente;
        if (cb.checked) state.fuentes.add(f); else state.fuentes.delete(f);
        redraw();
      });
    });
    el.querySelector('[data-action="all"]').addEventListener('click', () => {
      state.fuentes.clear();
      for (const f of fuentesForPais()) state.fuentes.add(f);
      el.querySelectorAll('input[data-fuente]').forEach(cb => cb.checked = true);
      redraw();
    });
    el.querySelector('[data-action="none"]').addEventListener('click', () => {
      state.fuentes.clear();
      el.querySelectorAll('input[data-fuente]').forEach(cb => cb.checked = false);
      redraw();
    });
  }

  function renderChart() {
    const el = document.getElementById('chart');
    const data = aggregate();
    if (data.length === 0) {
      el.innerHTML = '<h2>Calificados · semanal</h2><div class="muted">Sin datos para los filtros actuales.</div>';
      return;
    }

    // Series
    const inmoSeries = data.map(d => d.calif_inmo);
    const mmSeries   = data.map(d => d.calif_mm);
    const ratioSeries = data.map(d => d.calif_mm > 0 ? d.calif_inmo / d.calif_mm : null);

    const maxBar = Math.max(1, ...inmoSeries, ...mmSeries);
    // Ratio chart eje der: hasta 1.0 (100%). Si supera 1 algún punto, escalar.
    const maxR = Math.max(1.0, ...ratioSeries.filter(v => v != null), 0);
    const maxRY = Math.ceil(maxR * 10) / 10;

    const W = 1180, H = 420, padL = 64, padR = 68, padT = 24, padB = 56;
    const innerW = W - padL - padR, innerH = H - padT - padB;
    const xc = i => padL + (data.length === 1 ? innerW/2 : (i + 0.5) * innerW / data.length);
    const yL = v => padT + innerH - (v / maxBar) * innerH;
    const yR = v => padT + innerH - (v / maxRY) * innerH;
    const groupW = innerW / data.length;
    const barW = Math.max(4, groupW * 0.32);
    const offset = (barW + groupW * 0.06) / 2;

    const bars = data.map((d, i) => {
      const cx = xc(i);
      const x1 = cx - offset - barW/2, x2 = cx + offset - barW/2;
      const yI = yL(d.calif_inmo), yM = yL(d.calif_mm);
      return `
        <rect x="${x1}" y="${yI}" width="${barW}" height="${padT+innerH-yI}" fill="#34d399" opacity="0.9"><title>${bucketLabel(d.week)} · Calif Inmo: ${fmtN(d.calif_inmo)}</title></rect>
        <rect x="${x2}" y="${yM}" width="${barW}" height="${padT+innerH-yM}" fill="#818cf8" opacity="0.9"><title>${bucketLabel(d.week)} · Calif MM: ${fmtN(d.calif_mm)}</title></rect>
      `;
    }).join('');

    const ratioPath = ratioSeries.map((v, i) => v == null ? '' : ((i ? 'L' : 'M') + xc(i) + ',' + yR(v))).filter(Boolean).join(' ');
    const ratioDots = data.map((d, i) => {
      const v = ratioSeries[i];
      if (v == null) return '';
      return `<circle cx="${xc(i)}" cy="${yR(v)}" r="3.5" fill="#fbbf24"><title>${bucketLabel(d.week)} · Ratio Inmo / MM: ${fmtPct(v)}</title></circle>`;
    }).join('');

    // Ejes
    const yTicks = 5;
    const yEls = [];
    for (let i = 0; i <= yTicks; i++) {
      const v = Math.round((maxBar * i) / yTicks);
      const y = yL(v);
      yEls.push(`<line x1="${padL}" y1="${y}" x2="${W-padR}" y2="${y}" stroke="#1f2a44"/>`);
      yEls.push(`<text x="${padL-8}" y="${y+4}" text-anchor="end" font-size="11" fill="#94a3b8">${v.toLocaleString(localeForPais())}</text>`);
    }
    const yREls = [];
    for (let i = 0; i <= yTicks; i++) {
      const v = (maxRY * i) / yTicks;
      const y = yR(v);
      yREls.push(`<text x="${W-padR+8}" y="${y+4}" text-anchor="start" font-size="11" fill="#94a3b8">${(v*100).toFixed(0)}%</text>`);
    }
    const xTickEvery = data.length > 40 ? 6 : data.length > 24 ? 4 : data.length > 12 ? 2 : 1;
    const xEls = data.map((d, i) => (i % xTickEvery !== 0 && i !== data.length - 1) ? '' :
      `<text x="${xc(i)}" y="${H-padB+20}" text-anchor="middle" font-size="11" fill="#94a3b8">${bucketLabel(d.week)}</text>`).join('');

    // KPIs cabecera
    const lastIdx = data.length - 1;
    const lastD = data[lastIdx];
    const lastRatio = ratioSeries[lastIdx];
    const totals = data.reduce((a, d) => ({
      reg: a.reg + d.reg, inmo: a.inmo + d.calif_inmo, mm: a.mm + d.calif_mm, both: a.both + d.calif_both,
    }), {reg:0, inmo:0, mm:0, both:0});
    const totalRatio = totals.mm > 0 ? totals.inmo / totals.mm : null;
    const fuentesActivas = [...state.fuentes];

    // Hover rects
    const hoverRects = data.map((d, i) => {
      const cx = xc(i);
      return `<rect class="hover-rect" data-idx="${i}" x="${cx - groupW/2}" y="${padT}" width="${groupW}" height="${innerH}"/>`;
    }).join('');

    el.innerHTML = `
      <h2>Calificados · últimas ${data.length} ${state.granularity === 'day' ? 'días' : state.granularity === 'week' ? 'semanas' : 'meses'}</h2>
      <div class="chart-legend">
        <span style="display:inline-block;width:12px;height:10px;background:#34d399;vertical-align:middle;margin-right:5px;border-radius:2px;"></span>
        <strong>Calif Inmo</strong> · última ${fmtN(lastD.calif_inmo)} · total ${fmtN(totals.inmo)}
        &nbsp;|&nbsp;
        <span style="display:inline-block;width:12px;height:10px;background:#818cf8;vertical-align:middle;margin-right:5px;border-radius:2px;"></span>
        <strong>Calif MM</strong> · última ${fmtN(lastD.calif_mm)} · total ${fmtN(totals.mm)}
        &nbsp;|&nbsp;
        <span style="display:inline-block;width:14px;height:3px;background:#fbbf24;vertical-align:middle;margin-right:5px;"></span>
        <strong>Ratio Inmo / MM</strong> · última ${lastRatio != null ? fmtPct(lastRatio) : '–'} · total ${totalRatio != null ? fmtPct(totalRatio) : '–'}
        &nbsp;|&nbsp;
        Fuentes (${fuentesActivas.length}/${fuentesForPais().length}): ${fuentesActivas.length === fuentesForPais().length ? 'Todas' : fuentesActivas.join(', ') || 'Ninguna'}
      </div>
      <div class="chart-host">
        <svg class="chart-svg" viewBox="0 0 ${W} ${H}" preserveAspectRatio="none">
          ${yEls.join('')}
          ${bars}
          <path d="${ratioPath}" stroke="#fbbf24" stroke-width="2" fill="none"/>
          ${ratioDots}
          ${yREls.join('')}
          ${xEls}
          <line class="hover-guide" id="hover-guide" x1="0" y1="${padT}" x2="0" y2="${padT + innerH}" stroke="#94a3b8" stroke-dasharray="3 3"/>
          ${hoverRects}
        </svg>
        <div class="chart-tooltip" id="chart-tooltip"></div>
      </div>
      <p class="muted" style="margin-top:12px;font-size:12px;">
        Cohort por <strong>fecha de registro del lead</strong>. Un lead se cuenta como calificado MM si tuvo evento <code>state_id ∈ (20, 63)</code> en MM history; calificado Inmo si tuvo <code>state_id = 20</code> en Inmo history. La intersección es a nivel deal/negocio. <strong>Importante</strong>: la tabla Inmo de CO arranca el 2026-03-12; períodos anteriores tendrán Calif Inmo cero aunque la cohort haya registrado leads.
      </p>
    `;

    // Wireado tooltip
    const svg = el.querySelector('svg');
    const host = el.querySelector('.chart-host');
    const tip = el.querySelector('#chart-tooltip');
    const guide = el.querySelector('#hover-guide');
    el.querySelectorAll('.hover-rect').forEach(r => {
      r.addEventListener('mouseenter', () => {
        const i = parseInt(r.dataset.idx, 10);
        const d = data[i];
        const ratio = ratioSeries[i];
        tip.innerHTML = `
          <div class="tt-title">${bucketLabel(d.week)} · ${d.week}</div>
          <div class="tt-row">
            <span class="tt-swatch" style="background:#94a3b8"></span>
            <span class="tt-label">Registros (cohort)</span>
            <span class="tt-value">${fmtN(d.reg)}</span>
          </div>
          <div class="tt-row">
            <span class="tt-swatch" style="background:#34d399"></span>
            <span class="tt-label">Calif Inmo</span>
            <span class="tt-value">${fmtN(d.calif_inmo)}</span>
          </div>
          <div class="tt-row">
            <span class="tt-swatch" style="background:#818cf8"></span>
            <span class="tt-label">Calif MM</span>
            <span class="tt-value">${fmtN(d.calif_mm)}</span>
          </div>
          <div class="tt-row">
            <span class="tt-swatch" style="background:#a78bfa"></span>
            <span class="tt-label">MM ∩ Inmo</span>
            <span class="tt-value">${fmtN(d.calif_both)}</span>
          </div>
          <div class="tt-row" style="margin-top:4px;border-top:1px solid var(--border);padding-top:4px;">
            <span class="tt-swatch line" style="background:#fbbf24"></span>
            <span class="tt-label">Ratio Inmo / MM</span>
            <span class="tt-value">${ratio != null ? fmtPct(ratio) : '–'}</span>
          </div>
        `;
        guide.setAttribute('x1', xc(i));
        guide.setAttribute('x2', xc(i));
        guide.classList.add('show');
        tip.classList.add('show');
      });
      r.addEventListener('mousemove', (e) => {
        const hostRect = host.getBoundingClientRect();
        const px = e.clientX - hostRect.left;
        const py = e.clientY - hostRect.top;
        const tipW = tip.offsetWidth || 220;
        let left = px + 14;
        if (left + tipW > hostRect.width - 8) left = px - tipW - 14;
        tip.style.left = Math.max(4, left) + 'px';
        tip.style.top  = Math.max(4, py - 10) + 'px';
      });
      r.addEventListener('mouseleave', () => {
        tip.classList.remove('show');
        guide.classList.remove('show');
      });
    });
  }

  function renderCvrChart() {
    const el = document.getElementById('cvr-chart');
    const data = aggregate();
    if (data.length === 0) {
      el.innerHTML = '<h2>Conversion rate · Registros → Calificados</h2><div class="muted">Sin datos para los filtros actuales.</div>';
      return;
    }

    const cvrMm   = data.map(d => d.reg > 0 ? d.calif_mm   / d.reg : null);
    const cvrInmo = data.map(d => d.reg > 0 ? d.calif_inmo / d.reg : null);
    const observedMax = Math.max(0.01, ...cvrMm.filter(v => v != null), ...cvrInmo.filter(v => v != null));
    const maxY = Math.min(1.0, Math.ceil(observedMax * 10) / 10);

    const W = 1180, H = 360, padL = 64, padR = 24, padT = 24, padB = 56;
    const innerW = W - padL - padR, innerH = H - padT - padB;
    const xc = i => padL + (data.length === 1 ? innerW/2 : (i + 0.5) * innerW / data.length);
    const y  = v => padT + innerH - (v / maxY) * innerH;

    function linePath(series) {
      let parts = []; let prevValid = false;
      series.forEach((v, i) => {
        if (v == null) { prevValid = false; return; }
        parts.push((prevValid ? 'L' : 'M') + xc(i) + ',' + y(v));
        prevValid = true;
      });
      return parts.join(' ');
    }
    function dots(series, color) {
      return data.map((d, i) => {
        const v = series[i];
        if (v == null) return '';
        return `<circle cx="${xc(i)}" cy="${y(v)}" r="3" fill="${color}"/>`;
      }).join('');
    }
    // Linear regression sobre los puntos no-null. Devuelve {slope, intercept} o null si <2 puntos.
    function linearTrend(series) {
      const pts = [];
      series.forEach((v, i) => { if (v != null) pts.push({ x: i, y: v }); });
      if (pts.length < 2) return null;
      const n = pts.length;
      const sumX  = pts.reduce((s, p) => s + p.x, 0);
      const sumY  = pts.reduce((s, p) => s + p.y, 0);
      const sumXY = pts.reduce((s, p) => s + p.x * p.y, 0);
      const sumX2 = pts.reduce((s, p) => s + p.x * p.x, 0);
      const denom = n * sumX2 - sumX * sumX;
      if (denom === 0) return null;
      const slope = (n * sumXY - sumX * sumY) / denom;
      const intercept = (sumY - slope * sumX) / n;
      return { slope, intercept, firstIdx: pts[0].x, lastIdx: pts[pts.length - 1].x };
    }
    function trendLine(series, color) {
      const t = linearTrend(series);
      if (!t) return '';
      const yStart = t.intercept + t.slope * t.firstIdx;
      const yEnd   = t.intercept + t.slope * t.lastIdx;
      return `<line x1="${xc(t.firstIdx)}" y1="${y(yStart)}" x2="${xc(t.lastIdx)}" y2="${y(yEnd)}" stroke="${color}" stroke-width="1.5" stroke-dasharray="5 4" opacity="0.55"/>`;
    }

    const yTicks = 5;
    const yEls = [];
    for (let i = 0; i <= yTicks; i++) {
      const v = (maxY * i) / yTicks;
      const yy = y(v);
      yEls.push(`<line x1="${padL}" y1="${yy}" x2="${W-padR}" y2="${yy}" stroke="#1f2a44"/>`);
      yEls.push(`<text x="${padL-8}" y="${yy+4}" text-anchor="end" font-size="11" fill="#94a3b8">${(v*100).toFixed(0)}%</text>`);
    }
    const xTickEvery = data.length > 40 ? 6 : data.length > 24 ? 4 : data.length > 12 ? 2 : 1;
    const xEls = data.map((d, i) => (i % xTickEvery !== 0 && i !== data.length - 1) ? '' :
      `<text x="${xc(i)}" y="${H-padB+20}" text-anchor="middle" font-size="11" fill="#94a3b8">${bucketLabel(d.week)}</text>`).join('');

    // KPIs
    const totals = data.reduce((a, d) => ({
      reg: a.reg + d.reg, inmo: a.inmo + d.calif_inmo, mm: a.mm + d.calif_mm,
    }), {reg:0, inmo:0, mm:0});
    const totalCvrMm   = totals.reg > 0 ? totals.mm   / totals.reg : null;
    const totalCvrInmo = totals.reg > 0 ? totals.inmo / totals.reg : null;
    const lastIdx = data.length - 1;
    const lastCvrMm   = cvrMm[lastIdx];
    const lastCvrInmo = cvrInmo[lastIdx];

    const groupW = innerW / data.length;
    const hoverRects = data.map((d, i) => {
      const cx = xc(i);
      return `<rect class="hover-rect" data-idx="${i}" x="${cx - groupW/2}" y="${padT}" width="${groupW}" height="${innerH}"/>`;
    }).join('');

    el.innerHTML = `
      <h2>Conversion rate · Registros → Calificados</h2>
      <div class="chart-legend">
        <span style="display:inline-block;width:14px;height:3px;background:#818cf8;vertical-align:middle;margin-right:5px;"></span>
        <strong>Reg → Calif MM</strong> · última ${lastCvrMm != null ? fmtPct(lastCvrMm) : '–'} · total ${totalCvrMm != null ? fmtPct(totalCvrMm) : '–'}
        &nbsp;|&nbsp;
        <span style="display:inline-block;width:14px;height:3px;background:#34d399;vertical-align:middle;margin-right:5px;"></span>
        <strong>Reg → Calif Inmo</strong> · última ${lastCvrInmo != null ? fmtPct(lastCvrInmo) : '–'} · total ${totalCvrInmo != null ? fmtPct(totalCvrInmo) : '–'}
        &nbsp;|&nbsp;
        Total registros: ${fmtN(totals.reg)}
        &nbsp;|&nbsp;
        <span style="opacity:0.7;">- - -</span> línea de tendencia (regresión lineal sobre puntos visibles)
      </div>
      <div class="chart-host">
        <svg class="chart-svg" viewBox="0 0 ${W} ${H}" preserveAspectRatio="none" style="height:${H}px;">
          ${yEls.join('')}
          ${trendLine(cvrMm,   '#818cf8')}
          ${trendLine(cvrInmo, '#34d399')}
          <path d="${linePath(cvrMm)}"   stroke="#818cf8" stroke-width="2" fill="none"/>
          <path d="${linePath(cvrInmo)}" stroke="#34d399" stroke-width="2" fill="none"/>
          ${dots(cvrMm,   '#818cf8')}
          ${dots(cvrInmo, '#34d399')}
          ${xEls}
          <line class="hover-guide" id="cvr-hover-guide" x1="0" y1="${padT}" x2="0" y2="${padT + innerH}" stroke="#94a3b8" stroke-dasharray="3 3"/>
          ${hoverRects}
        </svg>
        <div class="chart-tooltip" id="cvr-tooltip"></div>
      </div>
    `;

    // tooltip
    const host = el.querySelector('.chart-host');
    const tip = el.querySelector('#cvr-tooltip');
    const guide = el.querySelector('#cvr-hover-guide');
    el.querySelectorAll('.hover-rect').forEach(r => {
      r.addEventListener('mouseenter', () => {
        const i = parseInt(r.dataset.idx, 10);
        const d = data[i];
        const vMm = cvrMm[i], vIn = cvrInmo[i];
        tip.innerHTML = `
          <div class="tt-title">${bucketLabel(d.week)} · ${d.week}</div>
          <div class="tt-row">
            <span class="tt-swatch" style="background:#94a3b8"></span>
            <span class="tt-label">Registros</span>
            <span class="tt-value">${fmtN(d.reg)}</span>
          </div>
          <div class="tt-row">
            <span class="tt-swatch line" style="background:#818cf8"></span>
            <span class="tt-label">Reg → Calif MM</span>
            <span class="tt-value">${vMm != null ? fmtPct(vMm) : '–'} (${fmtN(d.calif_mm)})</span>
          </div>
          <div class="tt-row">
            <span class="tt-swatch line" style="background:#34d399"></span>
            <span class="tt-label">Reg → Calif Inmo</span>
            <span class="tt-value">${vIn != null ? fmtPct(vIn) : '–'} (${fmtN(d.calif_inmo)})</span>
          </div>
        `;
        guide.setAttribute('x1', xc(i));
        guide.setAttribute('x2', xc(i));
        guide.classList.add('show');
        tip.classList.add('show');
      });
      r.addEventListener('mousemove', (e) => {
        const hostRect = host.getBoundingClientRect();
        const px = e.clientX - hostRect.left;
        const py = e.clientY - hostRect.top;
        const tipW = tip.offsetWidth || 220;
        let left = px + 14;
        if (left + tipW > hostRect.width - 8) left = px - tipW - 14;
        tip.style.left = Math.max(4, left) + 'px';
        tip.style.top  = Math.max(4, py - 10) + 'px';
      });
      r.addEventListener('mouseleave', () => {
        tip.classList.remove('show');
        guide.classList.remove('show');
      });
    });
  }

  function redraw() {
    renderChart();
    renderCvrChart();
  }

  try {
    await loadData();
    setMeta();
    renderControls();
    redraw();
  } catch (e) {
    document.getElementById('header-meta').textContent = 'Error: ' + e.message;
    console.error(e);
  }
})();
</script>
</body>
</html>
