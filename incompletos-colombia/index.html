<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📢</text></svg>">
<title>Tablero Leads Incompletos - Colombia</title>
<style>
  :root {
    --bg: #0f172a; --card: #1e293b; --card-hover: #263348;
    --border: #334155; --border-strong: #4b5563; --row-border: #283548;
    --text: #e2e8f0; --text-title: #f8fafc;
    --text-muted: #cbd5e1; --text-muted-2: #94a3b8; --text-muted-3: #64748b;
    --accent: #818cf8; --accent-on: #f8fafc;
    --row-total: #1a2744;
    --row-inc: #271a2e; --row-inc-fg: #f87171;
    --row-real: #172240; --row-real-fg: #38bdf8;
    --row-rec: #172520; --row-rec-fg: #34d399;
    --row-group: #172033;
    --sep: #0f172a;
    --bar-high: #f87171; --bar-med: #fbbf24; --bar-low: #34d399;
  }
  body.light {
    --bg: #f5f7fa; --card: #ffffff; --card-hover: #f1f5f9;
    --border: #e2e8f0; --border-strong: #cbd5e1; --row-border: #f1f5f9;
    --text: #334155; --text-title: #0f172a;
    --text-muted: #475569; --text-muted-2: #64748b; --text-muted-3: #94a3b8;
    --accent: #6366f1; --accent-on: #ffffff;
    --row-total: #eef2ff;
    --row-inc: #fee2e2; --row-inc-fg: #b91c1c;
    --row-real: #dbeafe; --row-real-fg: #0369a1;
    --row-rec: #dcfce7; --row-rec-fg: #047857;
    --row-group: #eef2ff;
    --sep: #e2e8f0;
    --bar-high: #dc2626; --bar-med: #d97706; --bar-low: #059669;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; background: var(--bg); color: var(--text); padding: 24px; transition: background 0.2s, color 0.2s; }
  .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; flex-wrap: wrap; gap: 12px; }
  .header h1 { font-size: 22px; font-weight: 600; color: var(--text-title); }
  .header h1 span { color: var(--accent); }
  .header .refresh-info { font-size: 13px; color: var(--text-muted-3); display: flex; align-items: center; gap: 10px; }
  .theme-btn { background: var(--card); border: 1px solid var(--border); color: var(--text-muted-2); border-radius: 6px; padding: 4px 10px; font-size: 14px; cursor: pointer; transition: background 0.15s, color 0.15s; }
  .theme-btn:hover { background: var(--card-hover); color: var(--accent); }

  .controls { display: flex; gap: 16px; margin-bottom: 16px; flex-wrap: wrap; align-items: stretch; }
  .control-card { background: var(--card); border-radius: 10px; border: 1px solid var(--border); padding: 14px 20px; }
  .control-card.grow { flex: 1; }
  .control-label { font-size: 11px; color: var(--text-muted-2); text-transform: uppercase; letter-spacing: 0.5px; font-weight: 600; margin-bottom: 8px; }

  .filter-bar { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
  .filter-bar label { display: flex; align-items: center; gap: 6px; font-size: 13px; color: var(--text-muted); cursor: pointer; padding: 4px 10px; border-radius: 6px; transition: background 0.15s; }
  .filter-bar label:hover { background: var(--border); }
  .filter-bar input[type="checkbox"] { accent-color: var(--accent); width: 15px; height: 15px; cursor: pointer; }
  .filter-bar .select-all { border-right: 1px solid var(--border); padding-right: 14px; }
  .fuente-tag { font-size: 10px; padding: 1px 5px; border-radius: 3px; margin-left: 3px; font-weight: 600; }

  select.granularity { background: var(--border); color: var(--text); border: 1px solid var(--border-strong); border-radius: 6px; padding: 8px 12px; font-size: 14px; cursor: pointer; font-weight: 500; }
  select.granularity:focus { outline: none; border-color: var(--accent); }

  .kpis { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; margin-bottom: 16px; }
  .kpi { background: var(--card); border-radius: 10px; padding: 18px; border: 1px solid var(--border); }
  .kpi .label { font-size: 12px; color: var(--text-muted-2); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 6px; }
  .kpi .value { font-size: 28px; font-weight: 700; color: var(--text-title); }
  .kpi .sub { font-size: 13px; color: var(--text-muted-3); margin-top: 4px; }
  .kpi.alert .value { color: var(--row-inc-fg); }
  .kpi.ok .value { color: var(--row-rec-fg); }

  .table-container { background: var(--card); border-radius: 10px; border: 1px solid var(--border); overflow-x: auto; margin-bottom: 16px; }
  table { width: 100%; border-collapse: separate; border-spacing: 0; font-size: 13px; }
  thead th { background: var(--border); color: var(--text-muted-2); font-weight: 600; text-transform: uppercase; font-size: 11px; letter-spacing: 0.5px; padding: 12px 14px; text-align: right; position: sticky; top: 0; z-index: 2; white-space: nowrap; }
  thead th:first-child { text-align: left; min-width: 280px; position: sticky; left: 0; z-index: 3; background: var(--border); border-right: 2px solid var(--border-strong); }
  tbody td { padding: 10px 14px; text-align: right; border-top: 1px solid var(--row-border); white-space: nowrap; }
  tbody td:first-child { text-align: left; font-weight: 500; color: var(--text-muted); position: sticky; left: 0; z-index: 1; background: var(--card); border-right: 2px solid var(--border-strong); }
  tbody tr { background: var(--card); }
  tbody tr:hover td { background: var(--card-hover); }
  tbody tr:hover td:first-child { background: var(--card-hover); }
  tbody tr.row-total td { font-weight: 700; color: var(--text-title); font-size: 14px; background: var(--row-total); }
  tbody tr.row-total td:first-child { background: var(--row-total); }
  tbody tr.row-incompletos td { font-weight: 700; color: var(--row-inc-fg); font-size: 14px; background: var(--row-inc); }
  tbody tr.row-incompletos td:first-child { background: var(--row-inc); }
  tbody tr.row-pct td { font-weight: 600; color: var(--row-inc-fg); font-size: 13px; background: var(--row-inc); }
  tbody tr.row-pct td:first-child { background: var(--row-inc); }
  tbody tr.row-inc-real td { font-weight: 700; color: var(--row-real-fg); font-size: 14px; background: var(--row-real); }
  tbody tr.row-inc-real td:first-child { background: var(--row-real); }
  tbody tr.row-pct-real td { font-weight: 600; color: var(--row-real-fg); font-size: 13px; background: var(--row-real); }
  tbody tr.row-pct-real td:first-child { background: var(--row-real); }
  tbody tr.row-recovered td { font-weight: 700; color: var(--row-rec-fg); font-size: 14px; background: var(--row-rec); }
  tbody tr.row-recovered td:first-child { background: var(--row-rec); }
  tbody tr.row-pct-rec td { font-weight: 600; color: var(--row-rec-fg); font-size: 13px; background: var(--row-rec); }
  tbody tr.row-pct-rec td:first-child { background: var(--row-rec); }
  tbody tr.row-separator td { padding: 0; height: 3px; background: var(--sep); border: none; }
  tbody tr.row-separator td:first-child { background: var(--sep); border-right-color: var(--sep); }
  tbody tr.row-group-header td { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.8px; color: var(--accent); padding: 8px 14px; background: var(--row-group); border: none; }
  tbody tr.row-group-header td:first-child { background: var(--row-group); }

  .bar-cell { display: flex; align-items: center; justify-content: flex-end; gap: 8px; }
  .bar-bg { width: 60px; height: 6px; background: var(--border); border-radius: 3px; overflow: hidden; }
  .bar-fill { height: 100%; border-radius: 3px; }
  .bar-fill.high { background: var(--bar-high); } .bar-fill.med { background: var(--bar-med); } .bar-fill.low { background: var(--bar-low); }

  .chart-section { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 16px; }
  .chart-card { background: var(--card); border-radius: 10px; border: 1px solid var(--border); padding: 20px; }
  .chart-card h3 { font-size: 14px; color: var(--text-muted-2); margin-bottom: 14px; }
  .chart-card--donut { max-height: 320px; }
  .chart-card--donut canvas { max-height: 220px; }
  canvas { width: 100% !important; }
</style>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>
<style>
  .back-link { display: inline-flex; align-items: center; gap: 6px; padding: 6px 12px; background: var(--card); border: 1px solid var(--border); border-radius: 6px; color: var(--text-muted-2); text-decoration: none; font-size: 13px; margin-bottom: 16px; transition: color 0.15s, border-color 0.15s; }
  .back-link:hover { color: var(--accent); border-color: var(--accent); }
</style>
<script>
  function toggleTheme() {
    const isLight = document.body.classList.toggle('light');
    localStorage.setItem('tablero-theme', isLight ? 'light' : 'dark');
    document.getElementById('themeToggle').textContent = isLight ? '☀️' : '🌙';
    if (typeof onUpdate === 'function') onUpdate();
  }
</script>
</head>
<body>
<a href="../" class="back-link">← Volver (Tableros Marketing Sellers)</a>
<div class="header">
  <h1>Leads Incompletos — <span>Colombia</span></h1>
  <div class="refresh-info">
    <span id="lastUpdate"></span>
    <button type="button" class="theme-btn" id="themeToggle" onclick="toggleTheme()" aria-label="Cambiar tema">🌙</button>
  </div>
</div>
<script>
  (function(){
    const saved = localStorage.getItem('tablero-theme');
    if (saved !== 'dark') document.body.classList.add('light');
    const btn = document.getElementById('themeToggle');
    if (btn) btn.textContent = document.body.classList.contains('light') ? '☀️' : '🌙';
  })();
</script>

<div class="controls">
  <div class="control-card">
    <div class="control-label">Granularidad</div>
    <select class="granularity" id="granSelect" onchange="onUpdate()">
      <option value="M" selected>Mensual</option>
      <option value="W">Semanal (lun-dom)</option>
      <option value="D">Diario</option>
    </select>
  </div>
  <div class="control-card grow">
    <div class="control-label">Fuentes</div>
    <div class="filter-bar" id="filterBar">
      <label class="select-all"><input type="checkbox" id="chkAll" checked onchange="toggleAll(this.checked)"> Todas</label>
    </div>
  </div>
</div>

<div class="kpis" id="kpis"></div>
<div class="chart-section">
  <div class="chart-card"><h3 id="chartPctTitle">% Incompletos por período</h3><canvas id="chartPct"></canvas></div>
  <div class="chart-card"><h3>Variables faltantes en Incompletos (último período completo)</h3><canvas id="chartVars"></canvas></div>
</div>
<div class="chart-section">
  <div class="chart-card chart-card--donut"><h3>Tipo de inmueble (todos los leads)</h3><canvas id="chartTipo"></canvas></div>
  <div class="chart-card chart-card--donut"><h3>Tipo de inmueble (incompletos actuales)</h3><canvas id="chartTipoInc"></canvas></div>
</div>
<div class="table-container">
  <table id="mainTable"><thead><tr><th>Métrica</th></tr></thead><tbody></tbody></table>
</div>

<script>
Object.assign(Chart.defaults.plugins.tooltip, {
  backgroundColor: 'rgba(15, 23, 42, 0.95)',
  borderColor: 'rgba(129, 140, 248, 0.4)',
  borderWidth: 1,
  titleColor: '#f8fafc',
  bodyColor: '#e2e8f0',
  titleFont: { size: 13, weight: '600' },
  bodyFont: { size: 12 },
  padding: 10,
  cornerRadius: 8,
  displayColors: true,
  boxPadding: 4
});

const FUENTES = {
  3:{name:'WEB',color:'#818cf8'}, 7:{name:'Estudio Inmueble',color:'#34d399'},
  20:{name:'CRM',color:'#fbbf24'}, 35:{name:'Comercial',color:'#f87171'},
  39:{name:'Broker',color:'#fb923c'}, 47:{name:'Lead Forms',color:'#a78bfa'}
};
const LABELS = {
  total:'Total registros', incompletos:'Incompletos Actualmente',
  sin_garajes:'Sin garajes (garage)', sin_banos:'Sin baños (bath)',
  sin_habitaciones:'Sin habitaciones (room_num)', sin_area:'Sin área (area)',
  sin_antiguedad:'Sin antigüedad (years_old)', sin_ascensor:'Sin ascensor',
  sin_lote_id:'Sin lote_id (geolocalización)', sin_direccion:'Sin dirección en localización (tl)',
  sin_tipo_inmueble_id:'Sin tipo inmueble id'
};
const COMP_VARS = ['sin_garajes','sin_banos','sin_habitaciones','sin_area','sin_antiguedad'];
const OTHER_VARS = ['sin_ascensor','sin_lote_id','sin_direccion','sin_tipo_inmueble_id'];
// Field mapping from compact BQ keys to readable keys
const FMAP = {t:'total',i:'incompletos',ir:'inc_real_60m',rec:'recuperados',a:'sin_area',b:'sin_banos',h:'sin_habitaciones',n:'sin_antiguedad',ti:'sin_tipo_inmueble_id',l:'sin_lote_id',d:'sin_direccion',ga:'sin_garajes',ac:'sin_ascensor',ag_nexus:'ag_nexus',ag_mabi:'ag_mabi',ag_wha:'ag_wha',ag_dup:'ag_dup',ag_pricing:'ag_pricing',ag_dock:'ag_dock',ag_habi:'ag_habi',ag_otros:'ag_otros',tp1:'tp1',tp2:'tp2',tp3:'tp3',tp4:'tp4',tp5:'tp5',tpo:'tpo',tpn:'tpn',ip1:'ip1',ip2:'ip2',ip3:'ip3',ip4:'ip4',ip5:'ip5',ipo:'ipo',ipn:'ipn'};
const TIPO_DEFS = [
  {key:'tp1',ikey:'ip1',label:'Apartamento',id:1},
  {key:'tp2',ikey:'ip2',label:'Casa',id:2},
  {key:'tp3',ikey:'ip3',label:'Casa conjunto cerrado',id:3},
  {key:'tp4',ikey:'ip4',label:'Tipo 4',id:4},
  {key:'tp5',ikey:'ip5',label:'Tipo 5',id:5},
  {key:'tpo',ikey:'ipo',label:'Otro tipo',id:'o'},
  {key:'tpn',ikey:'ipn',label:'Sin tipo (NULL)',id:'n'}
];
const TIPO_COLORS = ['#818cf8','#34d399','#fbbf24','#f87171','#fb923c','#a78bfa','#64748b'];
const NUM_FIELDS = Object.values(FMAP);
const AGENT_FIELDS = [
  {key:'ag_nexus',label:'Nexus (callcenter)'},
  {key:'ag_mabi',label:'MabiCO (bot)'},
  {key:'ag_wha',label:'WhatsApp Bot'},
  {key:'ag_dup',label:'Duplicate-backbone'},
  {key:'ag_pricing',label:'Pricing masivo'},
  {key:'ag_dock',label:'Docking-backbone'},
  {key:'ag_habi',label:'Agentes Habi (otros)'},
  {key:'ag_otros',label:'Otros'}
];
const SHOW_COUNT = 20;

let chartPct, chartVars, chartTipo, chartTipoInc, RAW = [];

// Build checkboxes
const fb = document.getElementById('filterBar');
Object.entries(FUENTES).forEach(([id,f]) => {
  const lbl = document.createElement('label');
  lbl.innerHTML = `<input type="checkbox" class="fuente-chk" value="${id}" checked onchange="onUpdate()"> ${f.name} <span class="fuente-tag" style="background:${f.color}30;color:${f.color}">ID ${id}</span>`;
  fb.appendChild(lbl);
});

function toggleAll(c) { document.querySelectorAll('.fuente-chk').forEach(x=>x.checked=c); onUpdate(); }
function getSelFuentes() { return [...document.querySelectorAll('.fuente-chk:checked')].map(c=>+c.value); }
function getGran() { return document.getElementById('granSelect').value; }

function formatPeriod(p, g) {
  if (g === 'M') { const [y,m]=p.split('-'); return ['ene','feb','mar','abr','may','jun','jul','ago','sep','oct','nov','dic'][+m-1]+'-'+y.slice(2); }
  if (g === 'W') { return p.replace('W0','S').replace('W','S'); } // 2026-W14 -> 2026-S14
  return p.slice(5); // daily: MM-DD
}

function aggregate(gran, selIds) {
  const filtered = RAW.filter(r => r.g === gran && selIds.includes(r.f));
  const periods = [...new Set(filtered.map(r=>r.p))].sort();
  return periods.map(p => {
    const rows = filtered.filter(r=>r.p===p);
    const out = { periodo: p };
    NUM_FIELDS.forEach(k => { out[k] = rows.reduce((s,r)=>s+(r[k]||0),0); });
    return out;
  });
}

function onUpdate() {
  const sel = getSelFuentes();
  document.getElementById('chkAll').checked = sel.length === Object.keys(FUENTES).length;
  if (!sel.length) {
    document.getElementById('kpis').innerHTML='';
    document.querySelector('#mainTable tbody').innerHTML='<tr><td colspan="22" style="text-align:center;padding:40px;color:#64748b">Selecciona al menos una fuente</td></tr>';
    if(chartPct){chartPct.destroy();chartPct=null;} if(chartVars){chartVars.destroy();chartVars=null;} if(chartTipo){chartTipo.destroy();chartTipo=null;} if(chartTipoInc){chartTipoInc.destroy();chartTipoInc=null;}
    return;
  }
  const g = getGran();
  let rows = aggregate(g, sel);
  // Take last SHOW_COUNT
  rows = rows.slice(-SHOW_COUNT);
  const label = sel.map(id=>FUENTES[id].name).join(', ');
  const gLabel = g==='M'?'Mensual':g==='W'?'Semanal':'Diario';
  document.getElementById('chartPctTitle').textContent = `% Incompletos — Vista ${gLabel}`;
  render(rows, g, label);
}

function varCell(v, total, maxPct) {
  const pct = total > 0 ? (v / total * 100) : 0;
  const ratio = maxPct > 0 ? pct / maxPct : 0;
  const color = ratio > 0.8 ? '#f87171' : ratio > 0.5 ? '#fbbf24' : '#34d399';
  const pctStr = pct >= 10 ? pct.toFixed(0) : pct.toFixed(1);
  return `<td style="color:${color}">${v.toLocaleString('es-CO')} <span style="opacity:0.6;font-size:11px">(${pctStr}%)</span></td>`;
}

function render(rows, gran, filterLabel) {
  const periods = rows.map(r=>r.periodo);
  const last = rows[rows.length-1];
  const prev = rows.length>1 ? rows[rows.length-2] : last;
  const cs = periods.length+1;

  const sC = [...COMP_VARS].sort((a,b)=>(last[b]||0)-(last[a]||0));
  const sO = [...OTHER_VARS].sort((a,b)=>(last[b]||0)-(last[a]||0));
  const pL = last.total>0?((last.incompletos/last.total)*100).toFixed(1):'0';
  const pP = prev.total>0?((prev.incompletos/prev.total)*100).toFixed(1):'0';
  const top = sC[0];
  const pFmt = p => formatPeriod(p, gran);

  document.getElementById('kpis').innerHTML = `
    <div class="kpi"><div class="label">Total ${pFmt(last.periodo)}</div><div class="value">${last.total.toLocaleString('es-CO')}</div><div class="sub">${filterLabel}</div></div>
    <div class="kpi alert"><div class="label">Incompletos ${pFmt(last.periodo)}</div><div class="value">${last.incompletos.toLocaleString('es-CO')}</div><div class="sub">${pL}% del total</div></div>
    <div class="kpi ${+pL>+pP?'alert':'ok'}"><div class="label">Variación vs ${pFmt(prev.periodo)}</div><div class="value">${(pL-pP)>0?'+':''}${(pL-pP).toFixed(1)}pp</div><div class="sub">${pP}% → ${pL}%</div></div>
    <div class="kpi"><div class="label">Top variable faltante</div><div class="value" style="font-size:20px">${LABELS[top]}</div><div class="sub">${last[top]||0} de ${last.incompletos} inc.</div></div>
  `;

  // Table
  document.querySelector('#mainTable thead tr').innerHTML = '<th>Métrica</th>'+periods.map(p=>`<th>${pFmt(p)}</th>`).join('');
  let tb = '';
  tb += `<tr class="row-total"><td>${LABELS.total}</td>`+periods.map(p=>`<td>${rows.find(r=>r.periodo===p).total.toLocaleString('es-CO')}</td>`).join('')+'</tr>';
  tb += `<tr class="row-incompletos"><td>${LABELS.incompletos}</td>`+periods.map(p=>`<td>${rows.find(r=>r.periodo===p).incompletos.toLocaleString('es-CO')}</td>`).join('')+'</tr>';
  tb += `<tr class="row-pct"><td>% Incompletos Actualmente</td>`+periods.map(p=>{const r=rows.find(x=>x.periodo===p);const pct=r.total>0?((r.incompletos/r.total)*100).toFixed(1):'0.0';return `<td>${pct}%</td>`;}).join('')+'</tr>';
  tb += `<tr class="row-inc-real"><td>Incompletos Totales (>60min tras creación)</td>`+periods.map(p=>`<td>${rows.find(r=>r.periodo===p).inc_real_60m.toLocaleString('es-CO')}</td>`).join('')+'</tr>';
  tb += `<tr class="row-pct-real"><td>% Incompletos Totales</td>`+periods.map(p=>{const r=rows.find(x=>x.periodo===p);const pct=r.total>0?((r.inc_real_60m/r.total)*100).toFixed(2):'0.00';return `<td>${pct}%</td>`;}).join('')+'</tr>';
  tb += `<tr class="row-separator"><td colspan="${cs}"></td></tr>`;

  // Variables de completitud
  tb += `<tr class="row-group-header"><td colspan="${cs}">Variables de completitud (definen estado incompleto en DMN)</td></tr>`;
  sC.forEach(f=>{const pcts=rows.map(r=>r.total>0?(r[f]||0)/r.total*100:0);const mx=Math.max(...pcts);tb+=`<tr><td>${LABELS[f]}</td>`+periods.map((p,idx)=>{const r=rows.find(x=>x.periodo===p);return varCell(r[f]||0,r.total,mx);}).join('')+'</tr>';});
  tb += `<tr class="row-separator"><td colspan="${cs}"></td></tr>`;

  // Otras variables
  tb += `<tr class="row-group-header"><td colspan="${cs}">Otras variables (informativas, no afectan completitud)</td></tr>`;
  sO.forEach(f=>{const pcts=rows.map(r=>r.total>0?(r[f]||0)/r.total*100:0);const mx=Math.max(...pcts);tb+=`<tr><td>${LABELS[f]}</td>`+periods.map((p,idx)=>{const r=rows.find(x=>x.periodo===p);return varCell(r[f]||0,r.total,mx);}).join('')+'</tr>';});
  tb += `<tr class="row-separator"><td colspan="${cs}"></td></tr>`;

  // Agentes y recuperados
  const agentTotals = AGENT_FIELDS.map(af=>({...af, total:rows.reduce((s,r)=>s+(r[af.key]||0),0)})).filter(a=>a.total>0).sort((a,b)=>b.total-a.total);
  if (agentTotals.length > 0) {
    tb += `<tr class="row-group-header"><td colspan="${cs}">Agentes que recuperaron leads (salieron de incompleto >60min)</td></tr>`;
  }
  tb += `<tr class="row-recovered"><td>Recuperados (salieron de incompleto)</td>`+periods.map(p=>`<td>${rows.find(r=>r.periodo===p).recuperados.toLocaleString('es-CO')}</td>`).join('')+'</tr>';
  tb += `<tr class="row-pct-rec"><td>% Recuperación</td>`+periods.map(p=>{const r=rows.find(x=>x.periodo===p);const pct=r.inc_real_60m>0?((r.recuperados/r.inc_real_60m)*100).toFixed(1):'0.0';return `<td>${pct}%</td>`;}).join('')+'</tr>';
  if (agentTotals.length > 0) {
    agentTotals.forEach(af => {
      const pcts = rows.map(r => r.recuperados > 0 ? (r[af.key]||0)/r.recuperados*100 : 0);
      const mx = Math.max(...pcts);
      tb += `<tr><td>${af.label}</td>` + periods.map(p => {
        const r = rows.find(x=>x.periodo===p);
        return varCell(r[af.key]||0, r.recuperados, mx);
      }).join('') + '</tr>';
    });
  }
  document.querySelector('#mainTable tbody').innerHTML = tb;

  // Chart: % lines + bars for absolute count on right axis
  const pctD = rows.map(r=>r.total>0?((r.incompletos/r.total)*100).toFixed(2):0);
  const pctR = rows.map(r=>r.total>0?((r.inc_real_60m/r.total)*100).toFixed(2):0);
  const absInc = rows.map(r=>r.incompletos);
  if(chartPct)chartPct.destroy();
  chartPct = new Chart(document.getElementById('chartPct'),{type:'line',data:{labels:periods.map(pFmt),datasets:[
    {type:'bar',label:'Incompletos Actualmente',data:absInc,backgroundColor:'rgba(248,113,113,0.15)',borderColor:'rgba(248,113,113,0.3)',borderWidth:1,yAxisID:'y1',order:3},
    {label:'% Inc. Actualmente',data:pctD,borderColor:'#f87171',backgroundColor:'rgba(248,113,113,0.08)',fill:false,tension:0.3,pointRadius:3,pointBackgroundColor:'#f87171',borderWidth:2,yAxisID:'y',order:1},
    {label:'% Inc. Totales (>60min)',data:pctR,borderColor:'#38bdf8',backgroundColor:'rgba(56,189,248,0.08)',fill:false,tension:0.3,pointRadius:3,pointBackgroundColor:'#38bdf8',borderWidth:2,borderDash:[5,3],yAxisID:'y',order:2}
  ]},options:{responsive:true,plugins:{legend:{display:true,labels:{color:'#94a3b8',usePointStyle:true,padding:14}}},scales:{y:{position:'left',ticks:{callback:v=>v+'%',color:'#94a3b8'},grid:{color:'#334155'}},y1:{position:'right',ticks:{color:'#94a3b8'},grid:{drawOnChartArea:false}},x:{ticks:{color:'#94a3b8',maxRotation:45},grid:{color:'#334155'}}}}});

  // Chart: bars
  const vd = sC.map(f=>({label:LABELS[f],value:last[f]||0}));
  if(chartVars)chartVars.destroy();
  chartVars = new Chart(document.getElementById('chartVars'),{type:'bar',data:{labels:vd.map(d=>d.label),datasets:[{data:vd.map(d=>d.value),backgroundColor:vd.map(d=>{const p=last.incompletos>0?d.value/last.incompletos*100:0;return p>80?'#f87171':p>40?'#fbbf24':'#34d399';}),borderRadius:4}]},options:{indexAxis:'y',responsive:true,plugins:{legend:{display:false}},scales:{x:{ticks:{color:'#94a3b8'},grid:{color:'#334155'}},y:{ticks:{color:'#cbd5e1',font:{size:12}},grid:{display:false}}}}});

  // Pie charts: Tipo de inmueble — dinámico, solo muestra tipos con datos > 0
  const tipoSums = TIPO_DEFS.map(td => ({...td, total: rows.reduce((s,r)=>s+(r[td.key]||0),0), inc: rows.reduce((s,r)=>s+(r[td.ikey]||0),0)}));
  const tipoVisible = tipoSums.filter(t => t.total > 0);
  const tipoLabels = tipoVisible.map(t => t.label);
  const tipoColors = tipoVisible.map((_,i) => TIPO_COLORS[i % TIPO_COLORS.length]);
  const tipoPctPlugin = {callbacks:{label:function(ctx){const t=ctx.dataset.data.reduce((a,b)=>a+b,0);const pct=t>0?((ctx.parsed/t)*100).toFixed(1):'0';return ctx.label+': '+ctx.parsed.toLocaleString('es-CO')+' ('+pct+'%)';}}};
  const tipoLegend = {display:true,position:'bottom',labels:{color:'#94a3b8',padding:12,usePointStyle:true}};

  if(chartTipo)chartTipo.destroy();
  chartTipo = new Chart(document.getElementById('chartTipo'),{type:'doughnut',data:{labels:tipoLabels,datasets:[{data:tipoVisible.map(t=>t.total),backgroundColor:tipoColors,borderColor:'#1e293b',borderWidth:2}]},options:{responsive:true,maintainAspectRatio:true,plugins:{legend:tipoLegend,tooltip:tipoPctPlugin}}});

  // Pie incompletos: cruce exacto tipo×incompleto
  const tipoIncVisible = tipoSums.filter(t => t.inc > 0);
  if(chartTipoInc)chartTipoInc.destroy();
  chartTipoInc = new Chart(document.getElementById('chartTipoInc'),{type:'doughnut',data:{labels:tipoIncVisible.map(t=>t.label),datasets:[{data:tipoIncVisible.map(t=>t.inc),backgroundColor:tipoIncVisible.map((_,i)=>TIPO_COLORS[i % TIPO_COLORS.length]),borderColor:'#1e293b',borderWidth:2}]},options:{responsive:true,maintainAspectRatio:true,plugins:{legend:tipoLegend,tooltip:tipoPctPlugin}}});
}

// Load data
function loadData(data) {
  RAW = data.map(r => {
    const out = { g: r.g, f: r.f, p: r.p };
    Object.entries(FMAP).forEach(([k,v]) => { out[v] = r[k] || 0; });
    return out;
  });
  document.getElementById('lastUpdate').textContent = `Datos al ${new Date().toLocaleString('es-CO')}`;
  onUpdate();
}

// Try loading external JSON, fallback to fetch from same directory
fetch('data.json').then(r=>r.json()).then(loadData).catch(()=>{
  // Inline fallback for minimal data if file not found
  document.querySelector('#mainTable tbody').innerHTML='<tr><td colspan="2" style="padding:40px;color:#f87171;text-align:center">No se encontró data.json. Coloca el archivo en la misma carpeta que este HTML.</td></tr>';
});
</script>
</body>
