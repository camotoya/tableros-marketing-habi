name: Actualizar datos BigQuery

on:
  schedule:
    - cron: '0 13 * * *'  # 7:00 AM México (UTC-6) / 8:00 AM Colombia (UTC-5)
  workflow_dispatch:  # Permite ejecutar manualmente desde GitHub

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: google-github-actions/setup-gcloud@v2

      - name: Authenticate with user credentials
        run: |
          echo '${{ secrets.GCP_CREDENTIALS }}' > /tmp/adc.json
          gcloud config set project ${{ secrets.GCP_PROJECT }}
          export CLOUDSDK_AUTH_CREDENTIAL_FILE_OVERRIDE=/tmp/adc.json
          echo "CLOUDSDK_AUTH_CREDENTIAL_FILE_OVERRIDE=/tmp/adc.json" >> $GITHUB_ENV
          export GOOGLE_APPLICATION_CREDENTIALS=/tmp/adc.json
          echo "GOOGLE_APPLICATION_CREDENTIALS=/tmp/adc.json" >> $GITHUB_ENV

      - name: Query BigQuery
        run: |
          bq query --use_legacy_sql=false --format=json --max_rows=10000 "
          WITH base AS (
            SELECT
              tni.id AS negocio_id, tiv.fuente_id, DATE(tni.fecha_creacion) AS fecha,
              tni.fecha_creacion AS fecha_ts, tni.last_estado_id,
              CASE WHEN tni.last_estado_id IN (7,39) THEN 1 ELSE 0 END AS ei,
              IF(tiv.area IS NULL OR tiv.area = 0,1,0) AS fa, IF(tiv.banos IS NULL OR tiv.banos = 0,1,0) AS fb,
              IF(tiv.num_habitaciones IS NULL OR tiv.num_habitaciones = 0,1,0) AS fh, IF(tiv.anos_antiguedad IS NULL,1,0) AS fn,
              IF(tiv.tipo_inmueble_id IS NULL,1,0) AS ft, IF(tl.lote_id IS NULL,1,0) AS fl,
              IF(tl.direccion IS NULL OR tl.direccion = '',1,0) AS fd, IF(tiv.garajes IS NULL,1,0) AS fg,
              IF(tiv.num_ascensores IS NULL,1,0) AS fc,
              tiv.tipo_inmueble_id AS tid
            FROM \`papyrus-data.habi_db.tabla_negocio_inmueble\` tni
            LEFT JOIN \`papyrus-data.habi_db.tabla_inmueble_v2\` tiv ON tiv.id = tni.inmueble_id
            LEFT JOIN \`papyrus-data.habi_db.tabla_localizacion_inmueble_v2\` tl ON tiv.localizacion_new_id = tl.id
            WHERE DATE(tni.fecha_creacion) >= '2024-01-01' AND tiv.fuente_id IN (3,7,20,35,39,47)
          ),
          inc_hist AS (
            SELECT DISTINCT h.negocio_id
            FROM \`sellers-main-prod.co_rds_staging.habi_db_tabla_historico_estado_v2\` h
            INNER JOIN base b ON b.negocio_id = h.negocio_id
            WHERE h.estado_id IN (7,39) AND DATETIME_DIFF(h.fecha_actualizacion, b.fecha_ts, MINUTE) >= 60
          ),
          inc_actual_60 AS (
            SELECT negocio_id FROM base
            WHERE last_estado_id IN (7,39) AND DATETIME_DIFF(CURRENT_DATETIME(), fecha_ts, MINUTE) >= 60
          ),
          inc_real AS (
            SELECT negocio_id FROM inc_hist UNION DISTINCT SELECT negocio_id FROM inc_actual_60
          ),
          recovered_ids AS (
            SELECT ir.negocio_id FROM inc_real ir
            INNER JOIN base b ON b.negocio_id = ir.negocio_id
            WHERE b.last_estado_id NOT IN (7,39)
          ),
          last_exit AS (
            SELECT h.negocio_id, h.agente,
              ROW_NUMBER() OVER (PARTITION BY h.negocio_id ORDER BY h.fecha_actualizacion DESC) rn
            FROM \`sellers-main-prod.co_rds_staging.habi_db_tabla_historico_estado_v2\` h
            INNER JOIN recovered_ids r ON r.negocio_id = h.negocio_id
            WHERE h.estado_id NOT IN (7,39)
          ),
          agent_map AS (
            SELECT negocio_id,
              CASE
                WHEN agente LIKE 'nexus:%' THEN 'Nexus'
                WHEN agente = 'MabiCO' THEN 'MabiCO'
                WHEN agente = 'wha_bot' THEN 'WhatsApp Bot'
                WHEN agente = 'duplicate-backbone' THEN 'Dup-backbone'
                WHEN agente = 'pricing_massive@habi.co' THEN 'Pricing masivo'
                WHEN agente = 'docking-backbone' THEN 'Docking-backbone'
                WHEN agente LIKE '%@habi.co' THEN 'Agentes Habi (otros)'
                ELSE 'Otros'
              END AS agente_grupo
            FROM last_exit WHERE rn = 1
          ),
          enriched AS (
            SELECT b.*,
              IF(ir.negocio_id IS NOT NULL, 1, 0) AS is_ir,
              IF(rec.negocio_id IS NOT NULL, 1, 0) AS is_rec,
              am.agente_grupo
            FROM base b
            LEFT JOIN inc_real ir ON ir.negocio_id = b.negocio_id
            LEFT JOIN recovered_ids rec ON rec.negocio_id = b.negocio_id
            LEFT JOIN agent_map am ON am.negocio_id = b.negocio_id
          ),
          monthly AS (
            SELECT 'M' AS g, fuente_id AS f, FORMAT_DATE('%Y-%m',fecha) AS p,
              COUNT(*) t, COUNTIF(ei=1) i, COUNTIF(is_ir=1) ir, COUNTIF(is_rec=1) rec,
              COUNTIF(ei=1 AND fa=1) a, COUNTIF(ei=1 AND fb=1) b, COUNTIF(ei=1 AND fh=1) h,
              COUNTIF(ei=1 AND fn=1) n, COUNTIF(ei=1 AND ft=1) ti, COUNTIF(ei=1 AND fl=1) l,
              COUNTIF(ei=1 AND fd=1) d, COUNTIF(ei=1 AND fg=1) ga, COUNTIF(ei=1 AND fc=1) ac,
              COUNTIF(is_rec=1 AND agente_grupo='Nexus') ag_nexus,
              COUNTIF(is_rec=1 AND agente_grupo='MabiCO') ag_mabi,
              COUNTIF(is_rec=1 AND agente_grupo='WhatsApp Bot') ag_wha,
              COUNTIF(is_rec=1 AND agente_grupo='Dup-backbone') ag_dup,
              COUNTIF(is_rec=1 AND agente_grupo='Pricing masivo') ag_pricing,
              COUNTIF(is_rec=1 AND agente_grupo='Docking-backbone') ag_dock,
              COUNTIF(is_rec=1 AND agente_grupo='Agentes Habi (otros)') ag_habi,
              COUNTIF(is_rec=1 AND agente_grupo='Otros') ag_otros,
              COUNTIF(tid=1) tp1, COUNTIF(tid=2) tp2, COUNTIF(tid=3) tp3, COUNTIF(tid=4) tp4, COUNTIF(tid=5) tp5, COUNTIF(tid NOT IN (1,2,3,4,5) AND tid IS NOT NULL) tpo, COUNTIF(tid IS NULL) tpn,
              COUNTIF(ei=1 AND tid=1) ip1, COUNTIF(ei=1 AND tid=2) ip2, COUNTIF(ei=1 AND tid=3) ip3, COUNTIF(ei=1 AND tid=4) ip4, COUNTIF(ei=1 AND tid=5) ip5, COUNTIF(ei=1 AND tid NOT IN (1,2,3,4,5) AND tid IS NOT NULL) ipo, COUNTIF(ei=1 AND tid IS NULL) ipn
            FROM enriched GROUP BY f,p
          ),
          week_periods AS (
            SELECT DISTINCT DATE_TRUNC(fecha, ISOWEEK) ws FROM enriched
            WHERE DATE_TRUNC(fecha, ISOWEEK) < DATE_TRUNC(CURRENT_DATE(), ISOWEEK)
            ORDER BY ws DESC LIMIT 25
          ),
          weekly AS (
            SELECT 'W' AS g, fuente_id AS f, FORMAT_DATE('%Y-W%V', DATE_TRUNC(fecha, ISOWEEK)) AS p,
              COUNT(*) t, COUNTIF(ei=1) i, COUNTIF(is_ir=1) ir, COUNTIF(is_rec=1) rec,
              COUNTIF(ei=1 AND fa=1) a, COUNTIF(ei=1 AND fb=1) b, COUNTIF(ei=1 AND fh=1) h,
              COUNTIF(ei=1 AND fn=1) n, COUNTIF(ei=1 AND ft=1) ti, COUNTIF(ei=1 AND fl=1) l,
              COUNTIF(ei=1 AND fd=1) d, COUNTIF(ei=1 AND fg=1) ga, COUNTIF(ei=1 AND fc=1) ac,
              COUNTIF(is_rec=1 AND agente_grupo='Nexus') ag_nexus,
              COUNTIF(is_rec=1 AND agente_grupo='MabiCO') ag_mabi,
              COUNTIF(is_rec=1 AND agente_grupo='WhatsApp Bot') ag_wha,
              COUNTIF(is_rec=1 AND agente_grupo='Dup-backbone') ag_dup,
              COUNTIF(is_rec=1 AND agente_grupo='Pricing masivo') ag_pricing,
              COUNTIF(is_rec=1 AND agente_grupo='Docking-backbone') ag_dock,
              COUNTIF(is_rec=1 AND agente_grupo='Agentes Habi (otros)') ag_habi,
              COUNTIF(is_rec=1 AND agente_grupo='Otros') ag_otros,
              COUNTIF(tid=1) tp1, COUNTIF(tid=2) tp2, COUNTIF(tid=3) tp3, COUNTIF(tid=4) tp4, COUNTIF(tid=5) tp5, COUNTIF(tid NOT IN (1,2,3,4,5) AND tid IS NOT NULL) tpo, COUNTIF(tid IS NULL) tpn,
              COUNTIF(ei=1 AND tid=1) ip1, COUNTIF(ei=1 AND tid=2) ip2, COUNTIF(ei=1 AND tid=3) ip3, COUNTIF(ei=1 AND tid=4) ip4, COUNTIF(ei=1 AND tid=5) ip5, COUNTIF(ei=1 AND tid NOT IN (1,2,3,4,5) AND tid IS NOT NULL) ipo, COUNTIF(ei=1 AND tid IS NULL) ipn
            FROM enriched WHERE DATE_TRUNC(fecha, ISOWEEK) IN (SELECT ws FROM week_periods) GROUP BY f,p
          ),
          day_periods AS (
            SELECT DISTINCT fecha FROM enriched WHERE fecha < CURRENT_DATE() ORDER BY fecha DESC LIMIT 25
          ),
          daily AS (
            SELECT 'D' AS g, fuente_id AS f, CAST(fecha AS STRING) AS p,
              COUNT(*) t, COUNTIF(ei=1) i, COUNTIF(is_ir=1) ir, COUNTIF(is_rec=1) rec,
              COUNTIF(ei=1 AND fa=1) a, COUNTIF(ei=1 AND fb=1) b, COUNTIF(ei=1 AND fh=1) h,
              COUNTIF(ei=1 AND fn=1) n, COUNTIF(ei=1 AND ft=1) ti, COUNTIF(ei=1 AND fl=1) l,
              COUNTIF(ei=1 AND fd=1) d, COUNTIF(ei=1 AND fg=1) ga, COUNTIF(ei=1 AND fc=1) ac,
              COUNTIF(is_rec=1 AND agente_grupo='Nexus') ag_nexus,
              COUNTIF(is_rec=1 AND agente_grupo='MabiCO') ag_mabi,
              COUNTIF(is_rec=1 AND agente_grupo='WhatsApp Bot') ag_wha,
              COUNTIF(is_rec=1 AND agente_grupo='Dup-backbone') ag_dup,
              COUNTIF(is_rec=1 AND agente_grupo='Pricing masivo') ag_pricing,
              COUNTIF(is_rec=1 AND agente_grupo='Docking-backbone') ag_dock,
              COUNTIF(is_rec=1 AND agente_grupo='Agentes Habi (otros)') ag_habi,
              COUNTIF(is_rec=1 AND agente_grupo='Otros') ag_otros,
              COUNTIF(tid=1) tp1, COUNTIF(tid=2) tp2, COUNTIF(tid=3) tp3, COUNTIF(tid=4) tp4, COUNTIF(tid=5) tp5, COUNTIF(tid NOT IN (1,2,3,4,5) AND tid IS NOT NULL) tpo, COUNTIF(tid IS NULL) tpn,
              COUNTIF(ei=1 AND tid=1) ip1, COUNTIF(ei=1 AND tid=2) ip2, COUNTIF(ei=1 AND tid=3) ip3, COUNTIF(ei=1 AND tid=4) ip4, COUNTIF(ei=1 AND tid=5) ip5, COUNTIF(ei=1 AND tid NOT IN (1,2,3,4,5) AND tid IS NOT NULL) ipo, COUNTIF(ei=1 AND tid IS NULL) ipn
            FROM enriched WHERE fecha IN (SELECT fecha FROM day_periods) GROUP BY f,p
          )
          SELECT * FROM monthly UNION ALL SELECT * FROM weekly UNION ALL SELECT * FROM daily
          ORDER BY g,f,p
          " > /tmp/bq_raw.json

      - name: Process and update data.json
        run: |
          python3 -c "
          import json
          with open('/tmp/bq_raw.json') as f:
              data = json.load(f)
          for r in data:
              for k in ['f','t','i','ir','rec','a','b','h','n','ti','l','d','ga','ac','ag_nexus','ag_mabi','ag_wha','ag_dup','ag_pricing','ag_dock','ag_habi','ag_otros','tp1','tp2','tp3','tp4','tp5','tpo','tpn','ip1','ip2','ip3','ip4','ip5','ipo','ipn']:
                  r[k] = int(r[k])
          with open('incompletos-colombia/data.json','w') as f:
              json.dump(data, f, separators=(',',':'))
          print(f'Rows: {len(data)}')
          "

      - name: Query OKR Marketing investment
        if: always()
        run: |
          grep -v '^\-\-' okr-marketing/query.sql | bq query --use_legacy_sql=false --format=json --max_rows=10000 > /tmp/okr_invest.json

      - name: Download OKR leads sheets and build data.json
        if: always()
        run: |
          SHEET_ID="1ZRThdQG7z6eyCCtvl6cFle8NbF4sOIjBdP5v6vkN4b8"
          curl -sL -o /tmp/co_sheet.csv "https://docs.google.com/spreadsheets/d/${SHEET_ID}/export?format=csv&gid=805848674"
          curl -sL -o /tmp/mx_sheet.csv "https://docs.google.com/spreadsheets/d/${SHEET_ID}/export?format=csv&gid=943056262"
          python3 okr-marketing/build_data.py /tmp/co_sheet.csv /tmp/mx_sheet.csv /tmp/okr_invest.json okr-marketing/data.json

      - name: Query Funnel Sellers (CO + MX)
        if: always()
        run: |
          bq query --use_legacy_sql=false --format=json --max_rows=100000 < tablero-marketing/query.sql > /tmp/funnel_raw.json

      - name: Query Antifunnel Sellers (CO + MX)
        if: always()
        run: |
          bq query --use_legacy_sql=false --format=json --max_rows=200000 < tablero-marketing/antifunnel.sql > /tmp/antifunnel_raw.json

      - name: Query MM-sin-Inmo states (CO + MX)
        if: always()
        run: |
          bq query --use_legacy_sql=false --format=json --max_rows=200000 < tablero-marketing/mm_sin_inmo_states.sql > /tmp/mm_sin_inmo_raw.json

      - name: Process funnel data.json
        if: always()
        run: |
          python3 -c "
          import json
          with open('/tmp/funnel_raw.json') as f:
              data = json.load(f)
          int_keys = ('f','tr','t','cal_mm','cal_inmo','asg_inmo','cal_mm_no_inmo','cal_mm_dup','cal_mm_desc','incomp','dup')
          for r in data:
              for k in int_keys:
                  r[k] = int(r[k])
          with open('tablero-marketing/data.json','w') as f:
              json.dump(data, f, separators=(',',':'))
          print(f'Funnel rows: {len(data)}')
          "

      - name: Process antifunnel data.json
        if: always()
        run: |
          python3 -c "
          import json
          with open('/tmp/antifunnel_raw.json') as f:
              data = json.load(f)
          for r in data:
              for k in ('f','state_id','n'):
                  r[k] = int(r[k])
          with open('tablero-marketing/antifunnel.json','w') as f:
              json.dump(data, f, separators=(',',':'))
          print(f'Antifunnel rows: {len(data)}')
          "

      - name: Process MM-sin-Inmo data.json
        if: always()
        run: |
          python3 -c "
          import json
          with open('/tmp/mm_sin_inmo_raw.json') as f:
              data = json.load(f)
          for r in data:
              for k in ('f','state_id','n'):
                  r[k] = int(r[k])
          with open('tablero-marketing/mm_sin_inmo_states.json','w') as f:
              json.dump(data, f, separators=(',',':'))
          print(f'MM-sin-Inmo rows: {len(data)}')
          "

      - name: Query PMAX MX quality
        if: always()
        run: |
          bq query --use_legacy_sql=false --format=json --max_rows=10000 < pmax-mexico-quality/query.sql > /tmp/pmax_raw.json

      - name: Process PMAX MX data.json
        if: always()
        run: |
          python3 -c "
          import json
          with open('/tmp/pmax_raw.json') as f:
              raw = json.load(f)
          utms = {}
          for r in raw:
              u = r['utm']; c = int(r['con_precio']); s = int(r['sin_precio'])
              if u not in utms:
                  utms[u] = {'leads': 0, 'primer': r['dia'], 'ultimo': r['dia']}
              utms[u]['leads'] += c + s
              if r['dia'] < utms[u]['primer']: utms[u]['primer'] = r['dia']
              if r['dia'] > utms[u]['ultimo']: utms[u]['ultimo'] = r['dia']
          utms_list = sorted([{'utm': k, **v} for k, v in utms.items()], key=lambda x: -x['leads'])
          rows = [{'d': r['dia'], 'u': r['utm'], 'c': int(r['con_precio']), 's': int(r['sin_precio'])} for r in raw]
          with open('pmax-mexico-quality/data.json', 'w') as f:
              json.dump({'utms': utms_list, 'rows': rows}, f, separators=(',', ':'))
          print(f'PMAX rows: {len(rows)} | UTMs: {len(utms_list)}')
          "

      - name: Query PMAX MX states (sin precio)
        if: always()
        run: |
          bq query --use_legacy_sql=false --format=json --max_rows=50000 < pmax-mexico-quality/states.sql > /tmp/pmax_states_raw.json

      - name: Process PMAX MX states.json
        if: always()
        run: |
          python3 -c "
          import json
          with open('/tmp/pmax_states_raw.json') as f:
              raw = json.load(f)
          rows = [{
              'd': r['dia'],
              'u': r['utm'],
              'sid': int(r['state_id']) if r.get('state_id') is not None else 0,
              'sn': r.get('state_name') or 'sin_estado',
              'n': int(r['n'])
          } for r in raw]
          with open('pmax-mexico-quality/states.json', 'w') as f:
              json.dump({'rows': rows}, f, separators=(',', ':'))
          print(f'PMAX states rows: {len(rows)}')
          "

      - name: Query Creativo Pamela (MX)
        if: always()
        run: |
          bq query --use_legacy_sql=false --format=json --max_rows=10000 < creativo-pamela/query.sql > /tmp/pamela_raw.json

      - name: Process Creativo Pamela data.json
        if: always()
        run: |
          python3 -c "
          import json
          with open('/tmp/pamela_raw.json') as f:
              data = json.load(f)
          int_keys = ('t','cal','asg','cit','vis','apr','acp','cie',
                      't_mm','cal_mm','asg_mm','cit_mm','vis_mm','apr_mm','acp_mm','cie_mm',
                      't_inmo','cal_inmo','asg_inmo','cit_inmo','vis_inmo','apr_inmo','acp_inmo','cie_inmo')
          for r in data:
              r['spend'] = float(r.get('spend') or 0)
              for k in int_keys:
                  r[k] = int(r[k])
          with open('creativo-pamela/data.json','w') as f:
              json.dump(data, f, separators=(',',':'))
          print(f'Pamela rows: {len(data)}')
          "

      - name: Query Funnel Incompletos / Revisar dirección (CO + MX)
        if: always()
        run: |
          bq query --use_legacy_sql=false --format=json --max_rows=200000 < incompletos-direccion/query.sql > /tmp/inc_dir_raw.json

      - name: Process Incompletos / Revisar dirección data.json
        if: always()
        run: |
          python3 -c "
          import json
          with open('/tmp/inc_dir_raw.json') as f:
              data = json.load(f)
          int_keys = ('f','tr','t','inc_pass','inc_left','rev_pass','rev_left')
          for r in data:
              for k in int_keys:
                  r[k] = int(r[k])
          with open('incompletos-direccion/data.json','w') as f:
              json.dump(data, f, separators=(',',':'))
          print(f'Inc/Dir rows: {len(data)}')
          "

      - name: Query Marketing WBR — leads + calificados (CO)
        if: always()
        run: |
          bq query --use_legacy_sql=false --format=json --max_rows=200000 < marketing-wbr/query_leads.sql > /tmp/wbr_leads_co.json
          echo "WBR leads CO rows: $(python3 -c 'import json,sys;print(len(json.load(open(sys.argv[1]))))' /tmp/wbr_leads_co.json)"

      - name: Query Marketing WBR — spend (CO)
        if: always()
        run: |
          bq query --use_legacy_sql=false --format=json --max_rows=200000 < marketing-wbr/query_spend.sql > /tmp/wbr_spend_co.json
          echo "WBR spend CO rows: $(python3 -c 'import json,sys;print(len(json.load(open(sys.argv[1]))))' /tmp/wbr_spend_co.json)"

      - name: Build Marketing WBR data.json
        if: always()
        run: |
          python3 marketing-wbr/build_data.py /tmp/wbr_leads_co.json /tmp/wbr_spend_co.json marketing-wbr/data.json

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add incompletos-colombia/data.json tablero-marketing/data.json tablero-marketing/antifunnel.json tablero-marketing/mm_sin_inmo_states.json okr-marketing/data.json pmax-mexico-quality/data.json pmax-mexico-quality/states.json creativo-pamela/data.json incompletos-direccion/data.json marketing-wbr/data.json
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Auto-update data.json $(date -u +%Y-%m-%d)"
            git push
          fi
